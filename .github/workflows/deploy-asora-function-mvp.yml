name: Deploy Lythaus MVP backend

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: "Exact 40-character commit SHA already validated by CI"
        required: true
        type: string
      ci_run_id:
        description: "Successful CI workflow run ID for the exact release SHA"
        required: true
        type: string
      approved_alpha_stage:
        description: "Kyle-approved MVP stage"
        required: true
        type: choice
        options: [technical_alpha, controlled_alpha, expanded_alpha, paused]
      known_disabled_features_json:
        description: "JSON array of intentionally disabled MVP features"
        required: true
        default: '[]'
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  deploy-mvp:
    uses: ./.github/workflows/deploy-asora-function-dev.yml
    with:
      target_environment: mvp
      release_sha: ${{ inputs.release_sha }}
      ci_run_id: ${{ inputs.ci_run_id }}
      approved_alpha_stage: ${{ inputs.approved_alpha_stage }}
      known_disabled_features_json: ${{ inputs.known_disabled_features_json }}
      function_app_name: asora-function-dev
      resource_group: asora-psql-flex
      key_vault_name: kv-asora-flex-dev
    secrets: inherit
