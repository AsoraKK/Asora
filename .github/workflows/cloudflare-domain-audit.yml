name: Cloudflare Domain Audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-domain-audit
  cancel-in-progress: false

jobs:
  recheck-previously-unavailable-endpoints:
    name: Recheck previously unavailable endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_AUDIT_API_TOKEN: ${{ secrets.CLOUDFLARE_AUDIT_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Require the audit token
        shell: bash
        run: test -n "$CLOUDFLARE_AUDIT_API_TOKEN"

      - name: Install audit prerequisites
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes ripgrep

      - name: Run Cloudflare domain audit
        shell: pwsh
        run: ./scripts/cloudflare/audit-domains.ps1

      - name: Upload sanitized audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-domain-audit-${{ github.run_id }}
          if-no-files-found: warn
          path: .artifacts/cloudflare-audit/sanitized-cloudflare-audit.json
