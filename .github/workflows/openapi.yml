name: OpenAPI

on:
  pull_request:
    paths:
      - 'api/openapi/**'
      - 'functions/**'
      - 'lib/**'
      - '.github/workflows/**'

jobs:
  contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci
      - run: npm run openapi:lint
      - name: Spectral lint
        run: npx spectral lint api/openapi/openapi.yaml
      - run: npm run openapi:bundle
      - name: Fail if bundled spec drift
        run: npm run openapi:check:bundle
      - name: Install pinned oasdiff
        env:
          OASDIFF_VERSION: 1.23.0
          OASDIFF_SHA256: 972b10535c3db4366b9dc3ebc11ca021279af3095267c3cffdca854a3a3c4f89
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/oasdiff.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/Tufin/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          echo "${OASDIFF_SHA256}  ${archive}" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" oasdiff
          chmod +x "$RUNNER_TEMP/oasdiff"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
      - name: Prepare base OpenAPI contract
        run: |
          set -euo pipefail
          git fetch origin ${{ github.base_ref }} --depth=1
          git show origin/${{ github.base_ref }}:api/openapi/dist/openapi.json \
            > "$RUNNER_TEMP/openapi-base.json"
      - name: Report OpenAPI diff
        run: |
          set -euo pipefail
          oasdiff changelog \
            "$RUNNER_TEMP/openapi-base.json" \
            api/openapi/dist/openapi.json \
            --format githubactions
      - name: Enforce semver when breaking
        run: |
          set -euo pipefail
          BASE_SPEC="$RUNNER_TEMP/openapi-base.json"
          if oasdiff breaking "$BASE_SPEC" api/openapi/dist/openapi.json --fail-on ERR --format githubactions; then
            exit 0
          fi
          CURR=$(node -pe 'JSON.parse(require("node:fs").readFileSync("api/openapi/dist/openapi.json","utf8")).info?.version ?? ""')
          PREV=$(node -pe 'JSON.parse(require("node:fs").readFileSync(process.argv[1],"utf8")).info?.version ?? ""' "$BASE_SPEC")
          echo "Breaking changes detected. Prev=$PREV Curr=$CURR"
          node -e "const parse=(value)=>{const match=String(value).trim().match(/^v?(\\d+)(?:\\.(\\d+))?(?:\\.(\\d+))?$/i);if(!match)return null;return [Number(match[1]),Number(match[2]||0),Number(match[3]||0)];};const prevRaw=process.argv[1];const currRaw=process.argv[2];const prev=parse(prevRaw);const curr=parse(currRaw);if(!prev||!curr){console.error(\`Unable to compare versions: Prev=\${prevRaw} Curr=\${currRaw}\`);process.exit(1);}const greater=curr[0]>prev[0]||(curr[0]===prev[0]&&(curr[1]>prev[1]||(curr[1]===prev[1]&&curr[2]>prev[2])));process.exit(greater ? 0 : 1);" "$PREV" "$CURR"
      - name: Validate route guard inventory
        run: node scripts/validate-functions-route-guards.js --out route-inventory.json --allowlist scripts/route-guard-allowlist.json
      - name: Check route / OpenAPI drift
        run: node scripts/check-route-drift.js route-inventory.json api/openapi/openapi.yaml
      - name: Validate OpenAPI examples
        run: npm run openapi:validate:examples
      - run: npx openapi-generator-cli version-manager set 7.7.0
      - run: npm run openapi:gen:dart
      - name: Fail if generated Dart client drifted
        run: npm run openapi:check:dart
      - name: Generate OpenAPI docs pre-release bundle
        run: npm run openapi:docs
      - name: Contract tests
        run: npm run openapi:test:contract
      - name: Upload bundled spec
        uses: actions/upload-artifact@v6
        with:
          name: openapi.json
          path: api/openapi/dist/openapi.json
      - name: Upload route inventory
        uses: actions/upload-artifact@v6
        with:
          name: openapi-route-inventory
          path: route-inventory.json
      - name: Upload OpenAPI docs
        uses: actions/upload-artifact@v6
        with:
          name: openapi-docs
          path: api/openapi/dist/index.html
