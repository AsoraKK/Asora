name: Staging Edge Cache Validate
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["deploy-asora-function-staging"]
    types: [completed]

jobs:
  validate:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Wait for deployment to settle
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 30
      - name: Run validation
        env:
          DOMAIN: ${{ secrets.STAGING_DOMAIN }}
          PATH_FEED: /api/feed/discover
          QS1: limit=20&cursor=first&includeTopics=tech
          QS2: limit=21&cursor=first&includeTopics=tech
          STAGING_SMOKE_TOKEN: ${{ secrets.STAGING_SMOKE_TOKEN }}
        run: |
          export AUTH_HDR="Authorization: Bearer $STAGING_SMOKE_TOKEN"
          bash ./scripts/validate_edge_cache.sh
