name: Public gateway E2E

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target classification for public gateway checks"
        type: choice
        required: true
        default: mvp
        options:
          - mvp
  workflow_run:
    workflows: ["Deploy Lythaus MVP backend"]
    types: [completed]
    branches: [main, "infra/azure-retirement-hardening-node22-tls-kv-pg-ha"]

permissions:
  contents: read

jobs:
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Public API gateway checks
    runs-on: ubuntu-latest
    environment: dev
    env:
      API_BASE_URL: ${{ vars.MVP_PUBLIC_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Validate gateway target
        shell: bash
        run: |
          set -euo pipefail
          test -n "$API_BASE_URL" || { echo "::error::MVP_PUBLIC_API_BASE_URL is required"; exit 1; }
          node -e 'const url = new URL(process.env.API_BASE_URL); if (url.protocol !== "https:" || url.hostname.endsWith(".azurewebsites.net") || !url.pathname.endsWith("/api")) throw new Error("MVP_PUBLIC_API_BASE_URL must be an HTTPS API gateway ending in /api");'

      - name: Run public gateway E2E
        shell: bash
        run: |
          set -euo pipefail
          node scripts/e2e-itest.js

# Azure host-admin endpoints are deliberately not invoked here. They are
# platform diagnostics, not ordinary application traffic, and require a
# separate enforcement rehearsal before Azure origin authentication can move
# beyond observe mode.
