name: MVP Preview Edge Cache Validate

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Exact temporary Worker preview hostname"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v7
      - name: Run validation against explicit preview
        env:
          DOMAIN: ${{ inputs.domain }}
          PATH_FEED: /api/feed/discover
          QS1: limit=20&cursor=first&includeTopics=tech
          QS2: limit=21&cursor=first&includeTopics=tech
          RUNTIME_AUTH_API_BASE_URL: https://${{ inputs.domain }}/api
          RUNTIME_AUTH_EMAIL: ${{ secrets.MVP_SMOKE_EMAIL }}
          RUNTIME_AUTH_PASSWORD: ${{ secrets.MVP_SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016
          node scripts/release/runtime-authenticated-command.mjs \
            --token-env LYTHAUS_RUNTIME_ACCESS_TOKEN -- bash -lc \
            'export AUTH_HDR="Authorization: Bearer $LYTHAUS_RUNTIME_ACCESS_TOKEN"; bash ./scripts/validate_edge_cache.sh'
