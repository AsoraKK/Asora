name: deploy-asora-function-dev

on:
  workflow_call:
    inputs:
      target_environment:
        description: "Deployment environment"
        required: true
        type: string
      release_sha:
        description: "Exact commit SHA already validated by CI"
        required: true
        type: string
      ci_run_id:
        description: "Successful CI workflow run containing immutable artifacts"
        required: true
        type: string
      approved_alpha_stage:
        description: "Kyle-approved Alpha stage recorded in release evidence"
        required: true
        type: string
      known_disabled_features_json:
        description: "JSON array of intentionally disabled Alpha features"
        required: true
        type: string
      function_app_name:
        description: "Optional Function App override"
        required: false
        type: string
      resource_group:
        description: "Optional Azure resource group override"
        required: false
        type: string
      key_vault_name:
        description: "Optional Key Vault override"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Deployment environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - staging
      release_sha:
        description: "Exact 40-character commit SHA already validated by CI"
        required: true
        type: string
      ci_run_id:
        description: "Successful CI workflow run ID for the exact release SHA"
        required: true
        type: string
      approved_alpha_stage:
        description: "Kyle-approved Alpha stage"
        required: true
        type: choice
        options:
          - technical_alpha
          - controlled_alpha
          - expanded_alpha
          - paused
      known_disabled_features_json:
        description: "JSON array of intentionally disabled Alpha features"
        required: true
        default: '[]'
        type: string
      function_app_name:
        description: "Optional Function App override"
        required: false
        type: string
      resource_group:
        description: "Optional Azure resource group override"
        required: false
        type: string
      key_vault_name:
        description: "Optional Key Vault override"
        required: false
        type: string
permissions:
  actions: read
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TARGET_ENV: ${{ inputs.target_environment }}
  RG: ${{ inputs.resource_group || 'asora-psql-flex' }}
  FUNC_APP: ${{ inputs.function_app_name || 'asora-function-dev' }}
  KEY_VAULT: ${{ inputs.key_vault_name || (inputs.target_environment == 'staging' && 'kv-asora-flex-dev' || '') }}
  RELEASE_SHA: ${{ inputs.release_sha }}
  CI_RUN_ID: ${{ inputs.ci_run_id }}
  APPROVED_ALPHA_STAGE: ${{ inputs.approved_alpha_stage }}
  KNOWN_DISABLED_FEATURES_JSON: ${{ inputs.known_disabled_features_json }}
  NODE_VERSION: 22

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    outputs:
      functions_artifact_sha256: ${{ steps.release_artifact.outputs.functions_sha256 }}
      functions_github_digest: ${{ steps.release_artifact.outputs.functions_github_digest }}
      web_github_digest: ${{ steps.release_artifact.outputs.web_github_digest }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install release validation tooling
        run: npm ci --ignore-scripts

      - name: Verify exact-SHA CI and download immutable Functions artifact
        id: release_artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::release_sha must be a full commit SHA"; exit 1; }
          [[ "$CI_RUN_ID" =~ ^[0-9]+$ ]] || { echo "::error::ci_run_id must be numeric"; exit 1; }

          RUN_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")
          RUN_SHA=$(jq -r '.head_sha' <<<"$RUN_JSON")
          RUN_NAME=$(jq -r '.name' <<<"$RUN_JSON")
          RUN_CONCLUSION=$(jq -r '.conclusion' <<<"$RUN_JSON")
          if [ "$RUN_SHA" != "$RELEASE_SHA" ] || [ "$RUN_NAME" != "CI" ] || [ "$RUN_CONCLUSION" != "success" ]; then
            echo "::error::CI run must be the successful CI workflow for release_sha"
            exit 1
          fi

          ARTIFACTS_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}/artifacts")
          FUNCTIONS_GITHUB_DIGEST=$(jq -r '.artifacts[] | select(.name == "functions-v4-artifact") | .digest' <<<"$ARTIFACTS_JSON")
          WEB_GITHUB_DIGEST=$(jq -r '.artifacts[] | select(.name == "flutter-web-release") | .digest' <<<"$ARTIFACTS_JSON")
          test -n "$FUNCTIONS_GITHUB_DIGEST" && test "$FUNCTIONS_GITHUB_DIGEST" != "null"
          test -n "$WEB_GITHUB_DIGEST" && test "$WEB_GITHUB_DIGEST" != "null"

          mkdir -p downloaded/functions
          gh run download "$CI_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name functions-v4-artifact --dir downloaded/functions
          test -f downloaded/functions/dist-v4-final.zip || {
            echo "::error::functions-v4-artifact did not contain dist-v4-final.zip"
            exit 1
          }
          cp downloaded/functions/dist-v4-final.zip functions-dist.zip
          scripts/secret-scan.sh --artifact functions-dist.zip
          ZIP=functions-dist.zip bash .github/scripts/preflight.sh

          rm -rf /tmp/lythaus-release-artifact
          mkdir -p /tmp/lythaus-release-artifact
          unzip -q functions-dist.zip -d /tmp/lythaus-release-artifact
          test -f /tmp/lythaus-release-artifact/host.json
          test -f /tmp/lythaus-release-artifact/package.json
          test -f /tmp/lythaus-release-artifact/index.js
          test -f /tmp/lythaus-release-artifact/src/index.js
          test -d /tmp/lythaus-release-artifact/shared
          test "$(jq -r .main /tmp/lythaus-release-artifact/package.json)" = "index.js"

          ARTIFACT_SHA256=$(sha256sum functions-dist.zip | awk '{print $1}')
          echo "FUNCTION_ARTIFACT_SHA256=$ARTIFACT_SHA256" >> "$GITHUB_ENV"
          {
            echo "functions_sha256=$ARTIFACT_SHA256"
            echo "functions_github_digest=$FUNCTIONS_GITHUB_DIGEST"
            echo "web_github_digest=$WEB_GITHUB_DIGEST"
          } >> "$GITHUB_OUTPUT"
          echo "Verified CI run $CI_RUN_ID for $RELEASE_SHA"
          echo "Functions artifact SHA-256: $ARTIFACT_SHA256"

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Configure CORS allowed origins
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          az functionapp config appsettings set \
            -g "$RG_CLEAN" \
            -n "$FUNC_APP_CLEAN" \
            --settings CORS_ALLOWED_ORIGINS='https://app.staging.lythaus.co,https://admin.staging.lythaus.co'

      - name: Inspect CORS allowed origins
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          CORS_ALLOWED_ORIGINS=$(az functionapp config appsettings list \
            -g "$RG_CLEAN" \
            -n "$FUNC_APP_CLEAN" \
            --query "[?name=='CORS_ALLOWED_ORIGINS'] | [0].value" \
            -o tsv | tr -d '\r')
          echo "CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-<empty>}"

      - name: Configure Azure platform CORS
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          SUBS_CLEAN=$(az account show --query id -o tsv | tr -d '\r')
          CORS_URI="https://management.azure.com/subscriptions/${SUBS_CLEAN}/resourceGroups/${RG_CLEAN}/providers/Microsoft.Web/sites/${FUNC_APP_CLEAN}/config/web?api-version=2026-03-15"
          CORS_BODY=$(jq -n \
            --arg admin "https://admin.staging.lythaus.co" \
            --arg app "https://app.staging.lythaus.co" \
            --arg localhost8080 "http://localhost:8080" \
            --arg localhost4200 "http://localhost:4200" \
            '{
              properties: {
                cors: {
                  allowedOrigins: [$admin, $app, $localhost8080, $localhost4200],
                  supportCredentials: false
                }
              }
            }')

          echo "Azure platform CORS before configuration:"
          az rest --method get --url "$CORS_URI" -o json | jq -r '.properties.cors.allowedOrigins // [] | .[]' || true

          az rest --method patch --url "$CORS_URI" --body "$CORS_BODY" --output none

          echo "Azure platform CORS after configuration:"
          az rest --method get --url "$CORS_URI" -o json | jq -r '.properties.cors.allowedOrigins // [] | .[]' || true

      - name: Publish to Flex via Kudu (recommended)
        run: |
          set -euo pipefail

          # Strip CRLF from all variables to prevent %0D in REST URLs
          SUBS=$(az account show --query id -o tsv | tr -d '\r')
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          SHORT_SHA=$(echo "$RELEASE_SHA" | cut -c1-7)

          # Extract storage pointer (as stored in functionApp config) and parse components
          DEPLOY_VALUE=$(az functionapp show -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query "properties.functionAppConfig.deployment.storage.value" -o tsv | tr -d '\r')
          if [ -z "$DEPLOY_VALUE" ]; then
            echo "::error::Function App is not Flex or deployment storage not configured"; exit 1
          fi

          STG=$(echo "$DEPLOY_VALUE" | sed -n 's#https://\([^.]*\)\.blob\.core\.windows\.net/.*#\1#p')
          CONT=$(echo "$DEPLOY_VALUE" | sed -n 's#https://[^/]*/\([^/]*\)/.*#\1#p')
          
          # Use versioned blob name for audit trail and rollback capability
          VERSIONED_BLOB="functionapp-${SHORT_SHA}.zip"
          
          echo "Uploading versioned package to $STG/$CONT/$VERSIONED_BLOB"
          az storage blob upload --auth-mode login \
            --account-name "$STG" \
            --container-name "$CONT" \
            --name "$VERSIONED_BLOB" \
            --file "functions-dist.zip" \
            --overwrite
          
          # Artifact integrity check: download what we just uploaded and verify hash
          echo "Verifying artifact integrity..."
          az storage blob download --auth-mode login \
            --account-name "$STG" \
            --container-name "$CONT" \
            --name "$VERSIONED_BLOB" \
            --file "/tmp/deployed-${SHORT_SHA}.zip"
          
          LOCAL_HASH=$(sha256sum functions-dist.zip | awk '{print $1}')
          REMOTE_HASH=$(sha256sum "/tmp/deployed-${SHORT_SHA}.zip" | awk '{print $1}')
          echo "Local artifact hash:  $LOCAL_HASH"
          echo "Remote artifact hash: $REMOTE_HASH"
          
          if [ "$LOCAL_HASH" != "$REMOTE_HASH" ]; then
            echo "::error::Artifact integrity check FAILED: hashes do not match"
            exit 1
          fi
          echo "✅ Artifact integrity verified"

          # Generate short-lived SAS for the versioned blob
          EXPIRY=$(date -u -d '30 minutes' +%Y-%m-%dT%H:%MZ)
          SAS=$(az storage blob generate-sas --account-name "$STG" --container-name "$CONT" --name "$VERSIONED_BLOB" --permissions r --expiry "$EXPIRY" --as-user --auth-mode login -o tsv)
          PKG_URI="https://$STG.blob.core.windows.net/$CONT/$VERSIONED_BLOB?$SAS"

          echo "Publishing via Kudu SCM /api/publish using versioned SAS URL"
          CREDS=$(az webapp deployment list-publishing-credentials -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" -o json)
          USER=$(echo "$CREDS" | jq -r .publishingUserName)
          PASS=$(echo "$CREDS" | jq -r .publishingPassword)
          SCM_URL="https://${FUNC_APP_CLEAN}.scm.azurewebsites.net/api/publish"

          curl -fsSL -u "$USER:$PASS" -H "Content-Type: application/json" -X POST -d "{\"type\":\"zip\",\"packageUri\":\"$PKG_URI\"}" "$SCM_URL"

          # Copy versioned blob to functionapp.zip for cold-start persistence
          echo "Copying $VERSIONED_BLOB to functionapp.zip for cold-start persistence..."
          az storage blob copy start --auth-mode login \
            --account-name "$STG" \
            --destination-container "$CONT" \
            --destination-blob functionapp.zip \
            --source-container "$CONT" \
            --source-blob "$VERSIONED_BLOB"
          
          # Wait for copy to complete
          for i in $(seq 1 10); do
            STATUS=$(az storage blob show --auth-mode login --account-name "$STG" --container-name "$CONT" --name functionapp.zip --query "properties.copy.status" -o tsv)
            if [ "$STATUS" = "success" ]; then
              echo "✅ Blob copy completed"
              break
            fi
            echo "Blob copy status: $STATUS (attempt $i/10)"
            sleep 2
          done

          # Trigger reindex and give the host longer warmup for Flex
          echo "Triggering function sync and restarting host"
          az rest --method post --uri "https://management.azure.com/subscriptions/$SUBS/resourceGroups/$RG_CLEAN/providers/Microsoft.Web/sites/$FUNC_APP_CLEAN/syncfunctiontriggers?api-version=2023-12-01" --verbose
          az functionapp restart -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN"

          echo "Waiting 90s for Flex host warmup..."
          sleep 90

      - name: Configure and verify Key Vault references
        continue-on-error: false
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          KEY_VAULT=$(echo "$KEY_VAULT" | tr -d '\r')
          if [ -z "$KEY_VAULT" ]; then
            mapfile -t KEY_VAULTS < <(az keyvault list -g "$RG_CLEAN" --query "[].name" -o tsv 2>/dev/null)
            if [ "${#KEY_VAULTS[@]}" -ne 1 ]; then
              echo "::error::Set key_vault_name explicitly when the resource group has zero or multiple Key Vaults"
              exit 1
            fi
            KEY_VAULT="${KEY_VAULTS[0]}"
          fi
          VAULT_RG=$(az keyvault show --name "$KEY_VAULT" --query resourceGroup -o tsv 2>/dev/null || echo "")
          if [ "$VAULT_RG" != "$RG_CLEAN" ]; then
            echo "::error::Key Vault $KEY_VAULT is not in resource group $RG_CLEAN"
            exit 1
          fi

          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" \
            --settings \
              "AUDIT_HMAC_KEY=@Microsoft.KeyVault(SecretUri=https://${KEY_VAULT}.vault.azure.net/secrets/audit-hmac-key/)" \
              "INVITE_CODE_PEPPER=@Microsoft.KeyVault(SecretUri=https://${KEY_VAULT}.vault.azure.net/secrets/invite-code-pepper/)" \
              "HIVE_API_KEY=@Microsoft.KeyVault(SecretUri=https://${KEY_VAULT}.vault.azure.net/secrets/HIVE-AI-KEY/)" \
              "CF_ACCESS_CLIENT_SECRET=@Microsoft.KeyVault(SecretUri=https://${KEY_VAULT}.vault.azure.net/secrets/cf-access-client-secret/)" \
            --output none

          SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          REFERENCES_URI="https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${RG_CLEAN}/providers/Microsoft.Web/sites/${FUNC_APP_CLEAN}/config/configreferences/appsettings?api-version=2024-11-01"
          REQUIRED_REFERENCES=(AUDIT_HMAC_KEY INVITE_CODE_PEPPER HIVE_API_KEY CF_ACCESS_CLIENT_SECRET)
          for attempt in $(seq 1 12); do
            REFERENCES_JSON=$(az rest --method get --uri "$REFERENCES_URI")
            unresolved=false
            for setting in "${REQUIRED_REFERENCES[@]}"; do
              STATUS=$(jq -r --arg setting "$setting" \
                '[.value[] | select((.id | split("/") | last) == $setting) | .properties.status][0] // "Missing"' \
                <<<"$REFERENCES_JSON")
              if [ "$STATUS" != "Resolved" ]; then
                unresolved=true
                echo "Key Vault reference $setting status: $STATUS (attempt $attempt/12)"
              fi
            done
            if [ "$unresolved" = false ]; then
              echo "✅ Required Key Vault references resolved"
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "::error::One or more required Key Vault references did not resolve"
              exit 1
            fi
            sleep 10
          done

      - name: Record immutable deployment metadata
        run: |
          set -euo pipefail
          az functionapp config appsettings set -g "$RG" -n "$FUNC_APP" \
            --setting DEPLOYMENT_SHA="$RELEASE_SHA" ALPHA_RELEASE_ENVIRONMENT="$TARGET_ENV" \
            --output none
          echo "Exact deployment SHA recorded in non-secret app settings"

      - name: Validate Flex app settings
        run: |
          set -euo pipefail
          SETTINGS=$(az functionapp config appsettings list -g "$RG" -n "$FUNC_APP" -o json)
          EXT_VERSION=$(echo "$SETTINGS" | jq -r '.[] | select(.name=="FUNCTIONS_EXTENSION_VERSION") | .value' || echo "")
          if [ "$EXT_VERSION" != "~4" ]; then
            echo "::error::FUNCTIONS_EXTENSION_VERSION must be ~4, found: ${EXT_VERSION:-NOT_SET}"; exit 1
          fi
          # Flex: FUNCTIONS_WORKER_RUNTIME should NOT be set
          WORKER=$(echo "$SETTINGS" | jq -r '.[] | select(.name=="FUNCTIONS_WORKER_RUNTIME") | .value' || echo "")
          if [ -n "$WORKER" ]; then
            echo "::error::FUNCTIONS_WORKER_RUNTIME must be unset on Flex, found: $WORKER"; exit 1
          fi
          # Guard: AUDIT_HMAC_KEY must be set (as Key Vault ref) in all deployed environments
          HMAC_SETTING=$(echo "$SETTINGS" | jq -r '.[] | select(.name=="AUDIT_HMAC_KEY") | .value' || echo "")
          if [ -z "$HMAC_SETTING" ]; then
            echo "::error::AUDIT_HMAC_KEY is not set — audit log pseudonymisation requires this setting"; exit 1
          fi

          if [[ "$HMAC_SETTING" != @Microsoft.KeyVault* ]]; then
            echo "::error::AUDIT_HMAC_KEY must be a Key Vault reference"; exit 1
          fi

          INVITE_PEPPER_SETTING=$(echo "$SETTINGS" | jq -r '.[] | select(.name=="INVITE_CODE_PEPPER") | .value' || echo "")
          if [[ "$INVITE_PEPPER_SETTING" != @Microsoft.KeyVault* ]]; then
            echo "::error::INVITE_CODE_PEPPER must be a Key Vault reference"; exit 1
          fi

          REQUIRED_KEY_VAULT_SETTINGS=(
            JWT_SECRET
            INVITE_CODE_PEPPER
            HIVE_API_KEY
            COSMOS_CONNECTION_STRING
            POSTGRES_CONNECTION_STRING
            AUDIT_HMAC_KEY
            FCM_PRIVATE_KEY
          )
          for key in "${REQUIRED_KEY_VAULT_SETTINGS[@]}"; do
            value=$(echo "$SETTINGS" | jq -r --arg key "$key" '.[] | select(.name==$key) | .value' || echo "")
            if [[ "$value" != @Microsoft.KeyVault* ]]; then
              echo "::error::$key must be configured as an Azure Key Vault reference"
              exit 1
            fi
          done

          echo "✅ Required Alpha secrets are configured as Key Vault references"

      - name: Post-deploy probe /api/health
        run: |
          set -euo pipefail
          
          # Strip CRLF from variables
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          
          URL="https://${FUNC_APP_CLEAN}.azurewebsites.net/api/health"
          BOGUS_URL="https://${FUNC_APP_CLEAN}.azurewebsites.net/api/__bogus__"
          
          echo "Running V4 PROGRAMMATIC MODEL runtime gates..."
          
          # Gate 1: Health returns 200 (20 probes, 5s intervals)
          GATE1_PASSED=false
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            echo "Gate 1 - probe $i/20: /api/health returned HTTP $code"
            if [ "$code" = "200" ]; then
              echo "✅ Gate 1 PASSED: health endpoint returns 200"
              GATE1_PASSED=true
              break
            fi
            if [ "$i" -lt 20 ]; then
              sleep 5
            fi
          done
          
          if [ "$GATE1_PASSED" = "false" ]; then
            echo "::error::Gate 1 FAILED: /api/health never returned 200 after 20 probes"
            exit 1
          fi
          
          # Gate 2: Bogus route returns 404 (not 500, validates host routing)
          bogus_code=$(curl -s -o /dev/null -w "%{http_code}" "$BOGUS_URL" || true)
          echo "Gate 2 - bogus route returned HTTP $bogus_code"
          if [ "$bogus_code" = "404" ]; then
            echo "✅ Gate 2 PASSED: bogus route returns 404 (host routing intact)"
          else
            echo "::error::Gate 2 FAILED: Expected 404, got $bogus_code (host may not be routing correctly)"
            exit 1
          fi
          
          # Gate 3: Admin /functions lists at least 'health' (v4 programmatic model)
          # Note: Programmatic model registers multiple functions
          ADMIN_KEY=$(az functionapp keys list -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query masterKey -o tsv | tr -d '\r')
          FUNCTIONS=$(curl -s -H "x-functions-key: $ADMIN_KEY" "https://${FUNC_APP_CLEAN}.azurewebsites.net/admin/functions" || echo "[]")
          FUNC_COUNT=$(echo "$FUNCTIONS" | jq -r '. | length')
          FUNC_NAMES=$(echo "$FUNCTIONS" | jq -r '.[].name' | tr '\n' ' ')
          echo "Gate 3 - indexed functions count: $FUNC_COUNT"
          echo "Gate 3 - indexed function names: $FUNC_NAMES"
          
          # V4 programmatic: expect at least health + ready + other handlers
          if [ "$FUNC_COUNT" -lt 1 ]; then
            echo "::error::Gate 3 FAILED: Expected at least 1 function, found $FUNC_COUNT"
            echo "Full admin response: $FUNCTIONS"
            exit 1
          fi
          
          if ! echo "$FUNC_NAMES" | grep -qw "health"; then
            echo "::error::Gate 3 FAILED: 'health' not found in indexed functions: $FUNC_NAMES"
            exit 1
          fi
          
          echo "✅ Gate 3 PASSED: health function is indexed (total: $FUNC_COUNT functions)"
          echo ""
          echo "🎉 All 3 runtime gates PASSED!"
          echo "   - Health endpoint: 200 OK"
          echo "   - Host routing: functional (404 for bogus)"
          echo "   - Functions registered: $FUNC_COUNT (including health)"

      - name: Diagnostic logs on failure
        if: failure()
        run: |
          set +e  # Continue on error for diagnostics
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          SHORT_SHA=$(echo "$RELEASE_SHA" | cut -c1-7)
          
          echo "=========================================="
          echo "Auto-diagnostics on deployment failure"
          echo "=========================================="
          echo ""
          
          echo "--- 1) Indexed functions from /admin/functions ---"
          ADMIN_KEY=$(az functionapp keys list -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query masterKey -o tsv | tr -d '\r' || echo "")
          if [ -n "$ADMIN_KEY" ]; then
            FUNCTIONS=$(curl -s -H "x-functions-key: $ADMIN_KEY" "https://${FUNC_APP_CLEAN}.azurewebsites.net/admin/functions" || echo "[]")
            echo "$FUNCTIONS" | jq '.'
            FUNC_COUNT=$(echo "$FUNCTIONS" | jq -r '. | length')
            echo "Total functions indexed: $FUNC_COUNT"
            echo "Function names:"
            echo "$FUNCTIONS" | jq -r '.[].name'
          else
            echo "Could not retrieve admin key"
          fi
          echo ""
          
          echo "--- 2) Deployed artifact verification ---"
          DEPLOY_VALUE=$(az functionapp show -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query "properties.functionAppConfig.deployment.storage.value" -o tsv | tr -d '\r' || echo "")
          if [ -n "$DEPLOY_VALUE" ]; then
            STG=$(echo "$DEPLOY_VALUE" | sed -n 's#https://\([^.]*\)\.blob\.core\.windows\.net/.*#\1#p')
            CONT=$(echo "$DEPLOY_VALUE" | sed -n 's#https://[^/]*/\([^/]*\)/.*#\1#p')
            VERSIONED_BLOB="functionapp-${SHORT_SHA}.zip"
            
            echo "Downloading deployed artifact: $STG/$CONT/$VERSIONED_BLOB"
            az storage blob download --auth-mode login \
              --account-name "$STG" \
              --container-name "$CONT" \
              --name "$VERSIONED_BLOB" \
              --file "/tmp/diag-${SHORT_SHA}.zip" 2>&1 || echo "Could not download blob"
            
            if [ -f "/tmp/diag-${SHORT_SHA}.zip" ]; then
              echo "Deployed artifact contents:"
              unzip -l "/tmp/diag-${SHORT_SHA}.zip" | head -n 50
              echo ""
              echo "Deployed artifact hash:"
              sha256sum "/tmp/diag-${SHORT_SHA}.zip"
            fi
          fi
          echo ""
          
          echo "--- 3) Recent Application Insights traces (last 15m) ---"
          az monitor app-insights query \
            --app "$FUNC_APP_CLEAN" \
            --analytics-query "traces | where timestamp > ago(15m) and (severityLevel >= 2 or message contains 'error' or message contains 'exception') | project timestamp, severityLevel, message | order by timestamp desc | take 30" \
            --offset 15m 2>&1 || echo "App Insights query not available or no errors found"
          echo ""
          
          echo "--- 4) Function app configuration ---"
          echo "FUNCTIONS_EXTENSION_VERSION:"
          az functionapp config appsettings list -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query "[?name=='FUNCTIONS_EXTENSION_VERSION'].value" -o tsv || echo "Not set"
          echo "FUNCTIONS_WORKER_RUNTIME (should be empty on Flex):"
          az functionapp config appsettings list -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query "[?name=='FUNCTIONS_WORKER_RUNTIME'].value" -o tsv || echo "Not set (expected)"
          echo ""
          
          echo "--- 5) Kudu diagnostic endpoints ---"
          echo "Attempting to fetch Kudu logs..."
          CREDS=$(az webapp deployment list-publishing-credentials -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" -o json 2>/dev/null || echo "{}")
          KUDU_USER=$(echo "$CREDS" | jq -r .publishingUserName)
          KUDU_PASS=$(echo "$CREDS" | jq -r .publishingPassword)
          if [ -n "$KUDU_USER" ] && [ "$KUDU_USER" != "null" ]; then
            echo "Recent Docker logs from Kudu:"
            curl -s -u "$KUDU_USER:$KUDU_PASS" "https://${FUNC_APP_CLEAN}.scm.azurewebsites.net/api/logs/docker" 2>&1 | tail -n 50 || echo "Could not fetch Kudu logs"
          fi
          echo ""
          
          echo "=========================================="
          echo "End of auto-diagnostics"
          echo "=========================================="

  acceptance:
    runs-on: ubuntu-latest
    needs: deploy
    environment: ${{ inputs.target_environment }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install release validation tooling
        run: npm ci --ignore-scripts

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Acceptance checks (Flex)
        run: |
          set -euo pipefail
          BASE="https://${FUNC_APP}.azurewebsites.net"

          # 1) Liveness must be 200
          echo "🔍 Testing health endpoint: $BASE/api/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/health")
          echo "   Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: expected 200, got $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"

          # 2) Bogus route must be 404
          echo "🔍 Testing 404 route: $BASE/api/__bogus__"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/__bogus__")
          echo "   Status: $STATUS"
          if [ "$STATUS" != "404" ]; then
            echo "❌ 404 check failed: expected 404, got $STATUS"
            exit 1
          fi
          echo "✅ 404 check passed"

          # 3) Unauthenticated notification endpoints must return 401/403 (not 500)
          echo "🔍 Testing unauthenticated notification endpoints"
          
          # Test /api/notifications/devices (GET without auth)
          DEVICES_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/notifications/devices")
          echo "   /api/notifications/devices (no auth): $DEVICES_STATUS"
          if [ "$DEVICES_STATUS" = "500" ]; then
            echo "❌ Notifications devices returned 500 (should be 401/403)"
            exit 1
          fi
          if [ "$DEVICES_STATUS" != "401" ] && [ "$DEVICES_STATUS" != "403" ]; then
            echo "⚠️  Expected 401/403 for unauthenticated request, got $DEVICES_STATUS"
          else
            echo "✅ Notifications devices auth check passed ($DEVICES_STATUS)"
          fi

          # Test /api/notifications/preferences (GET without auth)
          PREFS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE/api/notifications/preferences")
          echo "   /api/notifications/preferences (no auth): $PREFS_STATUS"
          if [ "$PREFS_STATUS" = "500" ]; then
            echo "❌ Notifications preferences returned 500 (should be 401/403)"
            exit 1
          fi
          if [ "$PREFS_STATUS" != "401" ] && [ "$PREFS_STATUS" != "403" ]; then
            echo "⚠️  Expected 401/403 for unauthenticated request, got $PREFS_STATUS"
          else
            echo "✅ Notifications preferences auth check passed ($PREFS_STATUS)"
          fi

          echo "✅ Notification endpoints properly reject unauthenticated requests"

          # 4) At least health is registered (v4 programmatic model)
          echo "🔍 Checking function registration"
          ADMIN_KEY=$(az functionapp keys list -g "$RG" -n "$FUNC_APP" --query 'masterKey' -o tsv)
          FUNCTIONS=$(curl -s "$BASE/admin/functions" -H "x-functions-key: $ADMIN_KEY")
          echo "   Functions registered:"
          echo "$FUNCTIONS" | jq -r '.[].name' | sed 's/^/     - /'
          FUNC_COUNT=$(echo "$FUNCTIONS" | jq -r '. | length')
          echo "   Total function count: $FUNC_COUNT"
          HEALTH_COUNT=$(echo "$FUNCTIONS" | jq -r '.[].name' | grep -cx 'health' || echo 0)
          if [ "$HEALTH_COUNT" != "1" ]; then
            echo "❌ Function registration check failed: health function not found"
            exit 1
          fi
          echo "✅ Function registration passed ($FUNC_COUNT functions including health)"

      - name: Required live OpenAPI contracts
        env:
          ALPHA_API_BASE_URL: https://${{ env.FUNC_APP }}.azurewebsites.net/api
          STAGING_SMOKE_TOKEN: ${{ secrets.STAGING_SMOKE_TOKEN }}
          REQUIRE_LIVE_CONTRACTS: 'true'
          CONTRACT_TIMEOUT_MS: '15000'
        run: |
          set -euo pipefail
          test -n "$STAGING_SMOKE_TOKEN" || { echo "::error::STAGING_SMOKE_TOKEN is required"; exit 1; }
          npm run openapi:test:contract

      - name: Verify DSR export storage configuration
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          PRINCIPAL_ID=$(az functionapp identity show -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --query principalId -o tsv)
          SA=$(az storage account list -g "$RG_CLEAN" --query "[?tags.purpose=='dsr-storage'].name | [0]" -o tsv)
          if [ -z "$SA" ]; then
            echo "::error::DSR storage account (tag purpose=dsr-storage) not found in RG $RG_CLEAN"
            exit 1
          fi
          DSR_NETWORK_MODE="private"
          if [[ "$TARGET_ENV" == "dev" || "$TARGET_ENV" == "staging" ]]; then
            DSR_NETWORK_MODE="public-rbac"
          fi
          bash infra/scripts/verify-dsr-storage.sh "$SA" "$RG_CLEAN" "$PRINCIPAL_ID" "$DSR_NETWORK_MODE"

      - name: Verify Cosmos DB network posture
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          COSMOS_ACCOUNT=$(az cosmosdb list -g "$RG_CLEAN" --query "[0].name" -o tsv)
          if [ -n "$COSMOS_ACCOUNT" ]; then
            COSMOS_NETWORK_MODE="private"
            if [[ "$TARGET_ENV" == "dev" || "$TARGET_ENV" == "staging" ]]; then
              COSMOS_NETWORK_MODE="public-keyvault"
            fi
            bash infra/scripts/verify-cosmos-private-endpoint.sh "$COSMOS_ACCOUNT" "$RG_CLEAN" "$COSMOS_NETWORK_MODE"
          else
            echo "::error::No Cosmos DB account found in RG"
            exit 1
          fi

      - name: Configure Cloudflare Access credentials (control-panel proxy)
        continue-on-error: false
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')

          CF_CLIENT_ID="${{ secrets.CF_Access_Client_Id }}"

          if [ -z "$CF_CLIENT_ID" ]; then
            echo "::error::Cloudflare Access client ID is required for the Alpha control panel"
            exit 1
          fi

          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" \
            --settings CF_ACCESS_CLIENT_ID="$CF_CLIENT_ID" --output none

          echo "✅ Cloudflare Access client ID configured; secret remains Key Vault-backed"

      - name: Configure DSR environment variables
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')
          
          # Get DSR storage account name
          DSR_SA=$(az storage account list -g "$RG_CLEAN" --query "[?tags.purpose=='dsr-storage'].name | [0]" -o tsv)
          if [ -z "$DSR_SA" ]; then
            echo "::error::DSR storage account not found; Alpha deployment cannot continue"
            exit 1
          fi
          
          echo "Setting DSR environment variables..."
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_EXPORT_STORAGE_ACCOUNT="$DSR_SA" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_EXPORT_CONTAINER="dsr-exports" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_QUEUE_NAME="dsr-requests" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_QUEUE_CONNECTION="DsrQueueStorage" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting "DsrQueueStorage__queueServiceUri=https://${DSR_SA}.queue.core.windows.net" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_MAX_CONCURRENCY="5" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_EXPORT_SIGNED_URL_TTL_HOURS="12" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_EXPORT_RETENTION_DAYS="30" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting DSR_PURGE_WINDOW_DAYS="30" --output none
          
          echo "✅ DSR environment variables configured"

      - name: Configure media storage environment variables
        run: |
          set -euo pipefail
          RG_CLEAN=$(echo "$RG" | tr -d '\r')
          FUNC_APP_CLEAN=$(echo "$FUNC_APP" | tr -d '\r')

          # Look for a storage account tagged purpose=media-storage, or fall back to explicit name
          MEDIA_SA=$(az storage account list -g "$RG_CLEAN" --query "[?tags.purpose=='media-storage'].name | [0]" -o tsv)
          if [ -z "$MEDIA_SA" ]; then
            # Try well-known name
            MEDIA_SA="asoramediadev"
            if ! az storage account show -n "$MEDIA_SA" -g "$RG_CLEAN" --query "name" -o tsv 2>/dev/null; then
              if jq -e 'index("mediaUpload") != null' <<<"$KNOWN_DISABLED_FEATURES_JSON" >/dev/null; then
                echo "Media storage is absent and mediaUpload is explicitly recorded as disabled"
                exit 0
              fi
              echo "::error::Media storage is required unless mediaUpload is explicitly disabled"
              exit 1
            fi
          fi

          echo "Setting media storage environment variables (account: $MEDIA_SA)..."
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting MEDIA_STORAGE_ACCOUNT="$MEDIA_SA" --output none
          az functionapp config appsettings set -g "$RG_CLEAN" -n "$FUNC_APP_CLEAN" --setting MEDIA_CONTAINER="user-media" --output none

          echo "✅ Media storage environment variables configured"

      - name: Verify Alpha cohort schema and capacity snapshot
        env:
          ALPHA_RELEASE_ADMIN_TOKEN: ${{ secrets.ALPHA_RELEASE_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$ALPHA_RELEASE_ADMIN_TOKEN" || { echo "::error::ALPHA_RELEASE_ADMIN_TOKEN is required"; exit 1; }
          curl --fail-with-body --silent --show-error --max-time 30 \
            --header "Authorization: Bearer $ALPHA_RELEASE_ADMIN_TOKEN" \
            "https://${FUNC_APP}.azurewebsites.net/api/_admin/ops/metrics?window=24h" \
            > alpha-ops-preflight.json
          jq --arg stage "$APPROVED_ALPHA_STAGE" -e \
            '.success == true and .data.partial == false and .data.cohort != null and .data.cohort.stage == $stage' \
            alpha-ops-preflight.json >/dev/null || {
              echo "::error::Alpha cohort schema/capacity snapshot is unavailable or does not match the approved stage"
              exit 1
            }

      - name: Run live DSR queue regression
        env:
          DSR_DRILL_BEARER_TOKEN: ${{ secrets.ALPHA_RELEASE_ADMIN_TOKEN }}
          DSR_DRILL_BASE_URL: https://${{ env.FUNC_APP }}.azurewebsites.net
          DSR_DRILL_REPORT_PATH: release-evidence/dsr-live-drill-report.json
          DSR_DRILL_EXPORT_USER_ID: ${{ vars.ALPHA_SMOKE_USER_ID }}
        run: |
          set -euo pipefail
          DSR_DRILL_QUEUE_ACCOUNT=$(az storage account list -g "$RG" --query "[?tags.purpose=='dsr-storage'].name | [0]" -o tsv)
          test -n "$DSR_DRILL_QUEUE_ACCOUNT" || { echo "::error::DSR storage account is required"; exit 1; }
          export DSR_DRILL_QUEUE_ACCOUNT
          node scripts/dsr-drills/live-dsr-queue-drill.mjs
          jq -e '.result == "passed"' release-evidence/dsr-live-drill-report.json >/dev/null

      - name: Write exact-SHA release manifest
        env:
          FUNCTIONS_ARTIFACT_SHA256: ${{ needs.deploy.outputs.functions_artifact_sha256 }}
          FUNCTIONS_GITHUB_DIGEST: ${{ needs.deploy.outputs.functions_github_digest }}
          WEB_GITHUB_DIGEST: ${{ needs.deploy.outputs.web_github_digest }}
        run: |
          set -euo pipefail
          jq -e 'type == "array" and all(.[]; type == "string")' <<<"$KNOWN_DISABLED_FEATURES_JSON" >/dev/null || {
            echo "::error::known_disabled_features_json must be a JSON string array"
            exit 1
          }
          case "$APPROVED_ALPHA_STAGE" in
            technical_alpha) HARD_CAP=50 ;;
            controlled_alpha) HARD_CAP=100 ;;
            expanded_alpha) HARD_CAP=250 ;;
            paused) HARD_CAP=0 ;;
            *) echo "::error::Unsupported Alpha stage"; exit 1 ;;
          esac
          COHORT_CAP=$(jq -r '.data.cohort.capacity' alpha-ops-preflight.json)
          [[ "$COHORT_CAP" =~ ^[0-9]+$ ]] || { echo "::error::Configured cohort cap is invalid"; exit 1; }
          [ "$COHORT_CAP" -le "$HARD_CAP" ] || { echo "::error::Configured cohort cap exceeds stage hard cap"; exit 1; }
          DEPLOYMENT_ID=$(az functionapp show -g "$RG" -n "$FUNC_APP" --query id -o tsv)
          DEPLOYED_HOST=$(az functionapp show -g "$RG" -n "$FUNC_APP" --query defaultHostName -o tsv)
          if [[ -z "$DEPLOYED_HOST" || "$DEPLOYED_HOST" == "null" ]]; then
            DEPLOYED_HOST="${FUNC_APP}.azurewebsites.net"
          fi
          [[ "$DEPLOYED_HOST" =~ ^[A-Za-z0-9.-]+\.azurewebsites\.net$ ]] || {
            echo "::error::Unable to derive a valid deployed Function hostname"
            exit 1
          }
          jq -n \
            --arg commitSha "$RELEASE_SHA" \
            --arg functionsArtifactSha256 "$FUNCTIONS_ARTIFACT_SHA256" \
            --arg functionsGithubDigest "$FUNCTIONS_GITHUB_DIGEST" \
            --arg webGithubDigest "$WEB_GITHUB_DIGEST" \
            --arg deploymentId "$DEPLOYMENT_ID" \
            --arg deployedHost "$DEPLOYED_HOST" \
            --arg environment "$TARGET_ENV" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg alphaStage "$APPROVED_ALPHA_STAGE" \
            --argjson cohortCap "$COHORT_CAP" \
            --argjson disabledFeatures "$KNOWN_DISABLED_FEATURES_JSON" \
            --arg ciRunId "$CI_RUN_ID" \
            '{
              schemaVersion: 1,
              commitSha: $commitSha,
              artifactHashes: {
                functionsZipSha256: $functionsArtifactSha256,
                functionsGithubArtifactDigest: $functionsGithubDigest,
                webGithubArtifactDigest: $webGithubDigest
              },
              deploymentId: $deploymentId,
              deployedHost: $deployedHost,
              environment: $environment,
              date: $date,
              approvedAlphaStage: $alphaStage,
              maximumCohortSize: $cohortCap,
              knownDisabledFeatures: $disabledFeatures,
              ciRunId: $ciRunId,
              validation: {
                exactShaCi: "passed",
                health: "passed",
                liveContracts: "passed",
                alphaCohortSchema: "passed",
                dsrQueueRegression: "passed",
                dsrStorage: "passed",
                cosmosNetworkPosture: "passed"
              }
            }' > release-manifest.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v6
        with:
          name: alpha-release-manifest-${{ inputs.release_sha }}
          path: |
            release-manifest.json
            release-evidence/dsr-live-drill-report.json
            alpha-ops-preflight.json
          if-no-files-found: error
