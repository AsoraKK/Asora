name: API Contract

on:
  pull_request:
    paths:
      - 'api/openapi/**'
      - 'functions/**'
      - 'lib/generated/api_client/**'
      - 'tests/contract/**'
      - 'tools/openapi/**'
      - 'scripts/check-git-diff-clean.js'
      - '.github/workflows/api-contract.yml'
  push:
    branches: [main]

jobs:
  api_contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: npm ci
        run: npm ci

      - name: Lint OpenAPI spec
        run: npm run openapi:lint

      - name: Spectral lint
        run: npx spectral lint api/openapi/openapi.yaml

      - name: Bundle OpenAPI spec
        run: npm run openapi:bundle

      - name: Fail if bundled spec drifted
        run: npm run openapi:check:bundle

      - name: Validate route guard inventory
        run: node scripts/validate-functions-route-guards.js --out route-inventory.json --allowlist scripts/route-guard-allowlist.json

      - name: Check route / OpenAPI drift
        run: node scripts/check-route-drift.js route-inventory.json api/openapi/openapi.yaml

      - name: Validate OpenAPI examples
        run: npm run openapi:validate:examples

      - name: Pin OpenAPI generator version
        run: npx openapi-generator-cli version-manager set 7.7.0

      - name: Generate Dart client
        run: npm run openapi:gen:dart

      - name: Fail if generated Dart client drifted
        run: npm run openapi:check:dart

      - name: Contract tests
        run: npm run openapi:test:contract

      - name: Upload OpenAPI artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openapi-contract-artifacts
          path: |
            api/openapi/dist/openapi.json
            route-inventory.json
