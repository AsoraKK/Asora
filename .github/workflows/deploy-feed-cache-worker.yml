name: Deploy Feed Cache Worker

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare/**'
      - 'workers/feed-cache/**'
      - '.github/workflows/deploy-feed-cache-worker.yml'
  workflow_dispatch:
    inputs:
      deployment_target:
        description: Explicit Worker deployment target
        required: true
        default: feed-cache
        type: choice
        options:
          - feed-cache
          - lythaus-gateway-preview
      release_sha:
        description: Exact validated SHA for the gateway preview
        required: false
        type: string
      ci_run_id:
        description: Successful exact-SHA CI run for the gateway preview
        required: false
        type: string
      cors_allowed_origin:
        description: Exact HTTPS browser origin for the gateway preview
        required: false
        type: string

concurrency:
  group: deploy-feed-cache-worker
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'push' || inputs.deployment_target == 'feed-cache' }}
    name: Deploy and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Deploy worker
        working-directory: workers/feed-cache
        run: npx wrangler@4 deploy --config wrangler.toml

      - name: Smoke test discover feed
        run: |
          set -euo pipefail
          URL="https://dev.asora.co.za/api/feed/discover?limit=20&cursor=first&includeTopics=tech"

          for attempt in 1 2 3 4 5 6; do
            echo "Smoke test attempt ${attempt}"
            RESPONSE="$(curl -sS -D - -o /dev/null "${URL}" || true)"
            echo "${RESPONSE}"
            if echo "${RESPONSE}" | head -n 1 | grep -Eq '^HTTP/[0-9.]+ 200'; then
              exit 0
            fi
            sleep 10
          done

          echo "Feed discover did not return HTTP 200 after deployment"
          exit 1

  deploy-lythaus-gateway-preview:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_target == 'lythaus-gateway-preview' }}
    uses: ./.github/workflows/deploy-lythaus-gateway-preview.yml
    with:
      release_sha: ${{ inputs.release_sha }}
      ci_run_id: ${{ inputs.ci_run_id }}
      cors_allowed_origin: ${{ inputs.cors_allowed_origin }}
    secrets: inherit
