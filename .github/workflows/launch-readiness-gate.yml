name: launch-readiness-gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  readiness:
    name: Validate launch blocker evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate observability alert routing config
        run: bash scripts/validate-alert-routing-config.sh

      - name: Validate store submission evidence checklist [LAUNCH BLOCKER]
        # Checks that every item in docs/runbooks/store-submission-evidence.md
        # is ticked off (- [x]).  Failure messages include the exact console
        # path and action needed to clear each item.
        run: bash scripts/validate-store-submission-evidence.sh

      - name: Validate signing materials (Android + iOS) [LAUNCH BLOCKER]
        # Decodes each secret and runs keytool / openssl validation.
        # Missing secrets print exact generation and upload instructions.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: bash scripts/validate-signing-material.sh

      - name: Check staging/prod SPKI pin lifecycle state
        shell: bash
        run: |
          set -euo pipefail
          ENV_FILE="lib/core/config/environment_config.dart"

          get_state() {
            local block_start="$1"
            local block_end="$2"
            awk "/^const ${block_start}/,/^const ${block_end}/" "$ENV_FILE" \
              | sed -n 's/.*lifecycleState: PinLifecycleState\.\([a-z]*\).*/\1/p' \
              | head -n 1
          }

          staging_state="$(get_state '_stagingMobileSecurity' '_stagingConfig')"
          prod_state="$(get_state '_prodMobileSecurity' '_prodConfig')"

          staging_state="${staging_state:-live}"
          prod_state="${prod_state:-live}"

          staging_empty=false
          prod_empty=false

          if awk '/^const _stagingMobileSecurity/,/^const _stagingConfig/' "$ENV_FILE" \
              | grep -Eq 'spkiPinsBase64:[[:space:]]*\[[[:space:]]*\]'; then
            staging_empty=true
          fi

          if awk '/^const _prodMobileSecurity/,/^const _prodConfig/' "$ENV_FILE" \
              | grep -Eq 'spkiPinsBase64:[[:space:]]*\[[[:space:]]*\]'; then
            prod_empty=true
          fi

          failed=false
          if [ "$staging_state" = "live" ] && [ "$staging_empty" = "true" ]; then
            echo "::error::LAUNCH BLOCKER: staging pins are marked live but spkiPinsBase64 is empty."
            echo "  Host: asora-function-staging.northeurope-01.azurewebsites.net"
            echo "  Run: ./scripts/extract-spki-pins.sh asora-function-staging.northeurope-01.azurewebsites.net"
            echo "  Then populate _stagingMobileSecurity.tlsPins.spkiPinsBase64 in $ENV_FILE"
            echo "  See: docs/runbooks/tls-pinning-rotation.md §Initial Pin Provisioning"
            failed=true
          fi

          if [ "$prod_state" = "live" ] && [ "$prod_empty" = "true" ]; then
            echo "::error::LAUNCH BLOCKER: production pins are marked live but spkiPinsBase64 is empty."
            echo "  Host: asora-function-prod.northeurope-01.azurewebsites.net"
            echo "  Run: ./scripts/extract-spki-pins.sh asora-function-prod.northeurope-01.azurewebsites.net"
            echo "  Also: CERT_INDEX=1 ./scripts/extract-spki-pins.sh asora-function-prod.northeurope-01.azurewebsites.net"
            echo "  Then populate _prodMobileSecurity.tlsPins.spkiPinsBase64 in $ENV_FILE (include ≥2 pins)"
            echo "  See: docs/runbooks/tls-pinning-rotation.md §Initial Pin Provisioning"
            failed=true
          fi

          if [ "$staging_state" = "planned" ] && [ "$staging_empty" = "true" ]; then
            echo "ℹ staging pins are planned; empty spkiPinsBase64 is intentional until the host is provisioned."
          fi

          if [ "$prod_state" = "planned" ] && [ "$prod_empty" = "true" ]; then
            echo "ℹ production pins are planned; empty spkiPinsBase64 is intentional until the host is provisioned."
          fi

          if [ "$failed" = "true" ]; then exit 1; fi
          echo "✓ Staging and production SPKI lifecycle states are explicit."

      - name: Setup Flutter (for SPKI pin gate tests)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run SPKI pin provisioning gate tests [LAUNCH BLOCKER]
        env:
          SPKI_GATE: 'true'
        run: |
          flutter pub get
          flutter test test/security/environment_spki_pin_test.dart --reporter expanded

      - name: iOS push notification deferral gate [LAUNCH BLOCKER if iOS targeted]
        # iOS push (APNS) is not yet implemented.
        # FCM routes iOS device tokens to result.iosDeferred — they are NOT delivered.
        # Android push delivery is unaffected.
        #
        # To make this step FAIL and block launch until iOS push is implemented:
        #   Set the IOS_PUSH_REQUIRED repository variable (Settings → Variables) to 'true'.
        #
        # To mark iOS push as implemented and clear this gate:
        #   Set the IOS_PUSH_IMPLEMENTED repository variable to 'true'.
        #   Also add APNS_KEY_BASE64, APNS_KEY_ID, APNS_TEAM_ID secrets and
        #   implement functions/src/notifications/clients/apnsClient.ts.
        env:
          IOS_PUSH_IMPLEMENTED: ${{ vars.IOS_PUSH_IMPLEMENTED || 'false' }}
          IOS_PUSH_REQUIRED: ${{ vars.IOS_PUSH_REQUIRED || 'false' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$IOS_PUSH_IMPLEMENTED" == "true" ]]; then
            echo "✓ iOS push implementation confirmed (IOS_PUSH_IMPLEMENTED=true)."
            exit 0
          fi

          echo "::warning title=iOS Push Deferred::APNS delivery is not implemented."
          echo "  iOS device tokens registered in the app will be tracked as result.iosDeferred."
          echo "  iOS users will NOT receive push notifications at this launch."
          echo "  Android push delivery via FCM is unaffected."
          echo ""
          echo "  To implement APNS delivery:"
          echo "    1. Create functions/src/notifications/clients/apnsClient.ts (APNs HTTP/2 provider API)"
          echo "    2. Update sendToDevices() to route platform === 'ios' through apnsClient"
          echo "    3. Add secrets: APNS_KEY_BASE64, APNS_KEY_ID, APNS_TEAM_ID"
          echo "    4. Set repository variable IOS_PUSH_IMPLEMENTED=true"
          echo "    5. Run integration tests with a real iOS device and APN sandbox"
          echo "  See: https://developer.apple.com/documentation/usernotifications/setting_up_a_remote_notification_server"

          if [[ "$IOS_PUSH_REQUIRED" == "true" ]]; then
            echo "::error title=iOS Push Required::iOS push is required for this launch (IOS_PUSH_REQUIRED=true) but APNS is not implemented."
            exit 1
          fi

          echo ""
          echo "  iOS push is deferred (not a launch blocker)."
          echo "  Set IOS_PUSH_REQUIRED=true in repository variables to block launch until APNS is implemented."
