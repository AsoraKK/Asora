name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Format and analyze job
  format-and-analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .
      
    - name: Analyze code
      run: flutter analyze

  # Test job
  test:
    runs-on: ubuntu-latest
    needs: format-and-analyze
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        cache: true
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Run tests
      run: flutter test

  # Web build job
  web-build:
    runs-on: ubuntu-latest
    needs: format-and-analyze

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Build web release
      run: flutter build web --release --no-tree-shake-icons

    - name: Copy _redirects for Cloudflare Pages
      run: cp web/_redirects build/web/_redirects

  # Web smoke tests — browser-critical paths
  web-smoke:
    runs-on: ubuntu-latest
    needs: format-and-analyze

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        cache: true

    - name: Get dependencies
      run: flutter pub get

    - name: Auth callback screen tests
      run: flutter test test/features/auth/presentation/auth_callback_screen_test.dart

    - name: Web auth service tests
      run: flutter test test/features/auth/application/web_auth_service_test.dart

    - name: Web token storage tests
      run: flutter test test/features/auth/application/web_token_storage_test.dart

    - name: GoRouter navigation tests
      run: flutter test test/core/routing/app_router_test.dart

    - name: Adaptive shell responsive tests
      run: flutter test test/ui/screens/adaptive_shell_test.dart

    - name: Profile screen tests
      run: flutter test test/screens/profile_screen_test.dart

  # Marketing site build
  marketing-site-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/marketing-site/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: apps/marketing-site

    - name: Build site
      run: npx astro build
      working-directory: apps/marketing-site

    - name: Verify critical files exist
      run: |
        test -f dist/index.html
        test -f dist/robots.txt
        test -f dist/sitemap.xml
        test -f dist/features/index.html
        test -f dist/pricing/index.html
        test -f dist/about/index.html
        test -f dist/ai-moderation/index.html
        test -f dist/contact/index.html
        echo "All critical marketing site files present"
      working-directory: apps/marketing-site
