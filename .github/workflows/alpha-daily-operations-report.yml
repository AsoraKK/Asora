name: Alpha Daily Operations Report

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: alpha-daily-operations-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    # Reuse the protected deployment environment so the existing Azure OIDC
    # federated credential is used instead of a branch-specific subject.
    environment: dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate report configuration
        shell: bash
        env:
          ALPHA_API_BASE_URL: ${{ vars.MVP_ADMIN_API_BASE_URL }}
          AZURE_RESOURCE_GROUP: ${{ vars.ALPHA_RESOURCE_GROUP || 'asora-psql-flex' }}
          AZURE_FUNCTIONAPP_NAME: ${{ vars.ALPHA_FUNCTIONAPP_NAME || 'asora-function-dev' }}
          AZURE_APPINSIGHTS_NAME: ${{ vars.ALPHA_APPINSIGHTS_NAME || 'appi-asora-function-dev-dsr' }}
          ALPHA_REPORT_ADMIN_TOKEN: ${{ secrets.ALPHA_REPORT_ADMIN_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_Access_Client_Id }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_Access_Client_Secret }}
        run: |
          set -euo pipefail
          [[ "$ALPHA_API_BASE_URL" == https://*/api ]] || { echo "::error::MVP_ADMIN_API_BASE_URL must be an HTTPS /api URL"; exit 1; }
          [[ "$ALPHA_API_BASE_URL" != *.azurewebsites.net* ]] || { echo "::error::MVP_ADMIN_API_BASE_URL must not use a direct Azure origin"; exit 1; }
          for key in AZURE_RESOURCE_GROUP AZURE_FUNCTIONAPP_NAME AZURE_APPINSIGHTS_NAME ALPHA_REPORT_ADMIN_TOKEN CF_ACCESS_CLIENT_ID CF_ACCESS_CLIENT_SECRET; do
            test -n "${!key:-}" || { echo "::error::$key is required"; exit 1; }
          done

      - name: Query aggregate telemetry
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.ALPHA_RESOURCE_GROUP || 'asora-psql-flex' }}
          AZURE_APPINSIGHTS_NAME: ${{ vars.ALPHA_APPINSIGHTS_NAME || 'appi-asora-function-dev-dsr' }}
        run: |
          set -euo pipefail
          mapfile -t query_files < <(find scripts/queries/alpha-daily-operations -maxdepth 1 -type f -name '*.kql' -print | sort)
          ((${#query_files[@]} > 0)) || { echo "::error::No aggregate telemetry queries found"; exit 1; }
          mkdir -p alpha-telemetry-parts
          outputs=()
          for query_file in "${query_files[@]}"; do
            output="alpha-telemetry-parts/$(basename "${query_file%.kql}").json"
            az monitor app-insights query \
              --app "$AZURE_APPINSIGHTS_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --analytics-query "$(tr '\n' ' ' < "$query_file")" \
              --offset 24h \
              --output json > "$output"
            jq -e '.tables[0].rows | length == 1' "$output" >/dev/null
            outputs+=("$output")
          done
          node scripts/merge-app-insights-aggregates.mjs --output alpha-telemetry.json "${outputs[@]}"
          jq -e '.tables[0].rows | length == 1' alpha-telemetry.json >/dev/null

      - name: Verify legacy admin Access service-token alignment
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.ALPHA_RESOURCE_GROUP || 'asora-psql-flex' }}
          AZURE_FUNCTIONAPP_NAME: ${{ vars.ALPHA_FUNCTIONAPP_NAME || 'asora-function-dev' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_AUDIT_API_TOKEN: ${{ secrets.CLOUDFLARE_AUDIT_API_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_Access_Client_Id }}
        run: |
          set -euo pipefail
          set +x
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::Cloudflare account ID is required"; exit 1; }
          test -n "$CLOUDFLARE_AUDIT_API_TOKEN" || { echo "::error::Cloudflare audit token is required"; exit 1; }
          test -n "$CF_ACCESS_CLIENT_ID" || { echo "::error::Cloudflare Access service client ID is required"; exit 1; }

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"; unset CLOUDFLARE_AUDIT_API_TOKEN CF_ACCESS_CLIENT_ID' EXIT
          backend_audience="$(az functionapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --query "[?name=='CF_ACCESS_AUDIENCE' || name=='CF_ACCESS_AUD'].value | [0]" \
            --output tsv | tr -d '\r')"
          test -n "$backend_audience" || { echo "::error::Backend Cloudflare Access audience is not configured"; exit 1; }

          api='https://api.cloudflare.com/client/v4'
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_AUDIT_API_TOKEN" \
            "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/access/apps" > "$workdir/apps.json"
          legacy_app_id="$(jq -r '[.result[] | select(.domain == "admin-api.asora.co.za")] | if length == 1 then .[0].id else empty end' "$workdir/apps.json")"
          legacy_audience="$(jq -r '[.result[] | select(.domain == "admin-api.asora.co.za")] | if length == 1 then .[0].aud else empty end' "$workdir/apps.json")"
          test -n "$legacy_app_id" && test -n "$legacy_audience" || { echo "::error::Expected exactly one legacy admin Access application"; exit 1; }
          test "$backend_audience" = "$legacy_audience" || { echo "::error::Backend Access audience does not match the legacy admin application"; exit 1; }

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_AUDIT_API_TOKEN" \
            "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/access/service_tokens" > "$workdir/service-tokens.json"
          service_token_id="$(jq -r --arg client_id "$CF_ACCESS_CLIENT_ID" '[.result[] | select(.client_id == $client_id)] | if length == 1 then .[0].id else empty end' "$workdir/service-tokens.json")"
          test -n "$service_token_id" || { echo "::error::Configured Access service token is absent or ambiguous"; exit 1; }

          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_AUDIT_API_TOKEN" \
            "$api/accounts/$CLOUDFLARE_ACCOUNT_ID/access/apps/$legacy_app_id/policies" > "$workdir/policies.json"
          jq -e --arg token_id "$service_token_id" '[.. | strings | select(. == $token_id)] | length > 0' "$workdir/policies.json" >/dev/null || {
            echo "::error::Configured Access service token is not included by the legacy admin policy"
            exit 1
          }

          echo "Legacy admin Access audience alignment: verified"
          echo "Legacy admin Access service-token policy: verified"

      - name: Read administrative snapshots
        shell: bash
        env:
          ALPHA_API_BASE_URL: ${{ vars.MVP_ADMIN_API_BASE_URL }}
          ALPHA_REPORT_ADMIN_TOKEN: ${{ secrets.ALPHA_REPORT_ADMIN_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_Access_Client_Id }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_Access_Client_Secret }}
        run: |
          set -euo pipefail
          HEADERS=(
            --header "Authorization: Bearer $ALPHA_REPORT_ADMIN_TOKEN"
            --header "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID"
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET"
          )
          curl --fail-with-body --silent --show-error --max-time 30 "${HEADERS[@]}" \
            "$ALPHA_API_BASE_URL/_admin/config" > alpha-config.json
          curl --fail-with-body --silent --show-error --max-time 30 "${HEADERS[@]}" \
            "$ALPHA_API_BASE_URL/_admin/ops/metrics?window=24h" > alpha-ops.json
          jq -e '.payload.alpha.stage' alpha-config.json >/dev/null
          jq -e '.success == true and .data.schemaVersion == 1' alpha-ops.json >/dev/null

      - name: Read exact deployed SHA
        id: deployment
        shell: bash
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.ALPHA_RESOURCE_GROUP || 'asora-psql-flex' }}
          AZURE_FUNCTIONAPP_NAME: ${{ vars.ALPHA_FUNCTIONAPP_NAME || 'asora-function-dev' }}
        run: |
          set -euo pipefail
          SHA=$(az functionapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --query "[?name=='DEPLOYMENT_SHA'].value | [0]" \
            --output tsv)
          [[ "$SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::DEPLOYMENT_SHA is absent or invalid"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Build privacy-safe daily report
        run: |
          node scripts/build-alpha-daily-report.mjs \
            --telemetry alpha-telemetry.json \
            --config alpha-config.json \
            --ops alpha-ops.json \
            --deployment-sha "${{ steps.deployment.outputs.sha }}" \
            --environment staging \
            --output alpha-daily-report.json \
            --markdown-output alpha-daily-report.md

      - name: Publish job summary
        run: cat alpha-daily-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report evidence
        uses: actions/upload-artifact@v6
        with:
          name: alpha-daily-operations-${{ steps.deployment.outputs.sha }}
          path: |
            alpha-daily-report.json
            alpha-daily-report.md
          if-no-files-found: error
          retention-days: 90
