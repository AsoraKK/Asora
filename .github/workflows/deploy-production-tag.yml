name: Deploy Production on Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  launch-readiness-gate:
    name: Launch Readiness Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Validate store submission evidence
        run: bash scripts/validate-store-submission-evidence.sh

      - name: Validate signing material
        run: bash scripts/validate-signing-material.sh

      - name: Validate alert routing config
        run: bash scripts/validate-alert-routing-config.sh

  beta-smoke-gate:
    name: Require beta browser smoke
    runs-on: ubuntu-latest
    needs: launch-readiness-gate
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const workflowId = 'beta-smoke.yml';
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 50,
            });

            const matches = data.workflow_runs.filter((run) => run.head_sha === sha);
            const passed = matches.find((run) => run.conclusion === 'success');

            if (!passed) {
              const latest = matches[0];
              const summary = latest
                ? `${latest.conclusion || latest.status} at ${latest.html_url}`
                : 'no matching workflow run found';
              core.setFailed(`Beta smoke must pass for ${sha} before production promotion. Latest match: ${summary}`);
            }

  deploy:
    name: Production Deploy
    needs: beta-smoke-gate
    uses: ./.github/workflows/deploy-asora-function-dev.yml
    with:
      target_environment: production
      function_app_name: asora-function-production
    secrets: inherit
