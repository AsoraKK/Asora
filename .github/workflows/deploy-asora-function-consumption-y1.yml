name: Legacy Consumption Y1 Reference

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-only:
    runs-on: ubuntu-latest
    steps:
      - name: Block nonexistent deployment target
        run: |
          echo '::error::Reference-only workflow: asora-function-y1-linux does not exist and must not be provisioned.'
          echo 'Use deploy-asora-function-mvp.yml for the existing shared-MVP Function App.'
          exit 1
