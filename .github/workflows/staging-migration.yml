name: Legacy Staging Migration Reference

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-only:
    runs-on: ubuntu-latest
    steps:
      - name: Block obsolete staging mutation
        run: |
          echo '::error::Reference-only workflow: the project has no separate Azure staging environment.'
          echo 'Database migrations require the reviewed shared-MVP migration runbook and rollback evidence.'
          exit 1
