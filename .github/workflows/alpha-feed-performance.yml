name: Alpha feed performance gate

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact deployed release SHA
        required: true
        type: string
      ci_run_id:
        description: Successful CI workflow run ID for release_sha
        required: true
        type: string
      alpha_api_base_url:
        description: Canonical deployed Alpha API HTTPS /api URL
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  performance:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 1

      - name: Verify exact-SHA CI
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          RUN_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")
          test "$(jq -r '.head_sha' <<<"$RUN_JSON")" = "$RELEASE_SHA"
          test "$(jq -r '.name' <<<"$RUN_JSON")" = "CI"
          test "$(jq -r '.conclusion' <<<"$RUN_JSON")" = "success"

      - name: Run representative Alpha feed matrix
        env:
          ALPHA_API_BASE_URL: ${{ inputs.alpha_api_base_url }}
          RUNTIME_AUTH_API_BASE_URL: ${{ inputs.alpha_api_base_url }}
          RUNTIME_AUTH_EMAIL: ${{ secrets.MVP_SMOKE_EMAIL }}
          RUNTIME_AUTH_PASSWORD: ${{ secrets.MVP_SMOKE_PASSWORD }}
          ALPHA_TEST_SESSION_ID: ${{ vars.ALPHA_TEST_SESSION_ID }}
          ALPHA_CUSTOM_FEED_ID: ${{ vars.ALPHA_PERF_CUSTOM_FEED_ID }}
          ALPHA_EMPTY_PROFILE_ID: ${{ vars.ALPHA_PERF_EMPTY_PROFILE_ID }}
          ALPHA_SMALL_PROFILE_ID: ${{ vars.ALPHA_PERF_SMALL_PROFILE_ID }}
          ALPHA_POPULATED_PROFILE_ID: ${{ vars.ALPHA_PERF_POPULATED_PROFILE_ID }}
          ALPHA_FEED_DURATION: 60s
          ALPHA_FEED_RATE: '1'
        run: |
          set -euo pipefail
          node -e 'const url = new URL(process.env.ALPHA_API_BASE_URL); if (url.protocol !== "https:" || url.hostname.endsWith(".azurewebsites.net") || !url.pathname.endsWith("/api")) throw new Error("alpha_api_base_url must be an HTTPS API gateway ending in /api");'
          node scripts/release/runtime-authenticated-command.mjs \
            --token-env ALPHA_SMOKE_TOKEN -- docker run --rm \
            -e ALPHA_API_BASE_URL \
            -e ALPHA_SMOKE_TOKEN \
            -e ALPHA_TEST_SESSION_ID \
            -e ALPHA_CUSTOM_FEED_ID \
            -e ALPHA_EMPTY_PROFILE_ID \
            -e ALPHA_SMALL_PROFILE_ID \
            -e ALPHA_POPULATED_PROFILE_ID \
            -e ALPHA_FEED_DURATION \
            -e ALPHA_FEED_RATE \
            -v "$PWD:/work" -w /work \
            grafana/k6:0.52.0 run load/k6/alpha-feed-matrix.js

      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: alpha-feed-performance-${{ inputs.release_sha }}
          path: alpha-feed-performance-results.json
          if-no-files-found: error
