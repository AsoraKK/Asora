name: MVP Preview Browser Smoke

on:
  workflow_dispatch:
    inputs:
      web_base_url:
        description: 'Exact Cloudflare Pages preview or live web origin'
        required: true
        type: string
      api_base_url:
        description: 'Exact Worker preview or live API /api base URL'
        required: true
        type: string
      admin_api_url:
        description: 'Exact protected admin API /api base URL'
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 30

    env:
      WEB_BASE_URL: ${{ inputs.web_base_url }}
      API_BASE_URL: ${{ inputs.api_base_url }}
      ADMIN_API_URL: ${{ inputs.admin_api_url }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_Access_Client_Id }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_Access_Client_Secret }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set smoke report path
        run: echo "BETA_SMOKE_REPORT_PATH=$RUNNER_TEMP/beta-smoke-report.json" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run beta browser smoke
        env:
          RUNTIME_AUTH_API_BASE_URL: ${{ inputs.api_base_url }}
          RUNTIME_AUTH_EMAIL: ${{ secrets.MVP_SMOKE_EMAIL }}
          RUNTIME_AUTH_PASSWORD: ${{ secrets.MVP_SMOKE_PASSWORD }}
        run: |
          node scripts/release/runtime-authenticated-command.mjs \
            --token-env LYTHAUS_RUNTIME_ACCESS_TOKEN -- node scripts/beta-smoke.mjs

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: beta-smoke-report
          path: ${{ env.BETA_SMOKE_REPORT_PATH }}
          if-no-files-found: warn
