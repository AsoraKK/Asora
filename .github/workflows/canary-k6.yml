name: Canary SLO Gate (k6)

on:
  workflow_call:
  workflow_run:
    workflows: ["Deploy to asora-function-dev"]
    types: [completed]
    branches: [main]

env:
  K6_BASE_URL: ${{ vars.MVP_PUBLIC_API_BASE_URL }}
  K6_SMOKE_TOKEN: ${{ secrets.K6_SMOKE_TOKEN }} # set in repo Secrets
  ALLOW_SHARED_MVP_LOAD_TESTS: ${{ vars.ALLOW_SHARED_MVP_LOAD_TESTS }}

jobs:
  canary-k6:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    name: Run k6 canary tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Verify environment and connectivity
        run: |
          [ "$ALLOW_SHARED_MVP_LOAD_TESTS" = "true" ] || { echo "Shared MVP load tests require ALLOW_SHARED_MVP_LOAD_TESTS=true"; exit 1; }
          test -n "$K6_BASE_URL" || { echo "MVP_PUBLIC_API_BASE_URL is required"; exit 1; }
          node -e "const u=new URL(process.env.K6_BASE_URL); if (u.protocol !== 'https:' || u.hostname.endsWith('.azurewebsites.net') || !u.pathname.endsWith('/api')) throw new Error('MVP_PUBLIC_API_BASE_URL must be an HTTPS gateway ending in /api');"
          sudo apt-get update -y && sudo apt-get install -y dnsutils curl
          H=$(node -e "console.log(new URL(process.env.K6_BASE_URL).hostname)")
          echo "Resolving configured public gateway..."
          dig +short "$H" || { echo "DNS resolution failed for $H"; exit 1; }
          echo "Testing public gateway health..."
          curl -f --max-time 10 "$K6_BASE_URL/health" || { echo "Health endpoint unreachable"; exit 1; }

      - name: Smoke test
        run: |
          SMOKE_P95_THRESHOLD=200ms SMOKE_P99_THRESHOLD=400ms \
          k6 run load/k6/smoke.js \
            --summary-export=load/k6/smoke-raw.json

      - name: Feed read test
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-load') }}
        run: |
          FEED_READ_P95_THRESHOLD=200ms FEED_READ_P99_THRESHOLD=400ms \
          k6 run load/k6/feed-read.js \
            --summary-export=load/k6/feed-read-raw.json

      - name: Upload k6 artifacts
        uses: actions/upload-artifact@v6
        if: always()  # Upload even if k6 fails (for debugging)
        with:
          name: k6-canary-${{ github.run_id }}
          path: |
            load/k6/*-summary.txt
            load/k6/*-summary.json
            load/k6/*-raw.json

      - id: read_smoke
        name: Read smoke summary
        if: always()  # Read even if test failed (for PR comment)
        run: |
          {
            echo "text<<EOF"
            cat load/k6/smoke-summary.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - id: read_feed
        if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-load') }}
        name: Read feed summary
        run: |
          {
            echo "text<<EOF"
            cat load/k6/feed-read-summary.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          message: |
            ## k6 Canary SLO
            - Base: `${{ env.K6_BASE_URL }}`
            - Thresholds: p95<200ms, p99<400ms, error_rate<1%
            <details><summary>smoke</summary>

            ```txt
            ${{ steps.read_smoke.outputs.text }}
            ```
            </details>
            <details><summary>feed-read</summary>

            ```txt
            ${{ steps.read_feed.outputs.text || 'Not run (add run-load label to PR)' }}
            ```
            </details>

  canary-k6-chaos:
    if: ${{ vars.ALLOW_SHARED_MVP_CHAOS_TESTS == 'true' }}
    needs: [canary-k6]
    name: Run k6 chaos scenarios
    runs-on: ubuntu-latest
    env:
      CHAOS_ENABLED: "true"
      K6_BASE_URL: ${{ vars.MVP_PUBLIC_API_BASE_URL }}
      K6_SMOKE_TOKEN: ${{ secrets.K6_SMOKE_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Verify environment and connectivity
        run: |
          [ "$ALLOW_SHARED_MVP_LOAD_TESTS" = "true" ] || { echo "Shared MVP load tests require ALLOW_SHARED_MVP_LOAD_TESTS=true"; exit 1; }
          test -n "$K6_BASE_URL" || { echo "MVP_PUBLIC_API_BASE_URL is required"; exit 1; }
          node -e "const u=new URL(process.env.K6_BASE_URL); if (u.protocol !== 'https:' || u.hostname.endsWith('.azurewebsites.net') || !u.pathname.endsWith('/api')) throw new Error('MVP_PUBLIC_API_BASE_URL must be an HTTPS gateway ending in /api');"
          sudo apt-get update -y && sudo apt-get install -y dnsutils curl
          H=$(node -e "console.log(new URL(process.env.K6_BASE_URL).hostname)")
          echo "Resolving configured public gateway..."
          dig +short "$H" || { echo "DNS resolution failed for $H"; exit 1; }
          echo "Testing public gateway health..."
          curl -f --max-time 10 "$K6_BASE_URL/health" || { echo "Health endpoint unreachable"; exit 1; }

      - name: Run chaos scenarios
        run: |
          k6 run load/k6/chaos.js \
            --summary-export=load/k6/chaos-raw.json

      - name: Upload chaos artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: k6-chaos-${{ github.run_id }}
          path: |
            load/k6/chaos-summary.json
            load/k6/chaos-raw.json

      - name: Read chaos summary
        if: always()
        run: |
          {
            echo "text<<EOF"
            cat load/k6/chaos-summary.json
            echo "EOF"
          } >> $GITHUB_OUTPUT
