name: Legacy Function Deployment Reference

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reference-only:
    runs-on: ubuntu-latest
    steps:
      - name: Block obsolete deployment path
        run: |
          echo '::error::This workflow is reference-only and cannot deploy or provision infrastructure.'
          echo 'Use deploy-asora-function-mvp.yml, which delegates exact-artifact deployment to deploy-asora-function-dev.yml.'
          exit 1
