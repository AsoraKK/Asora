name: Edge Cache Validation

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/**'
      - 'functions/src/feed/**'
      - 'functions/tests/feed/**'
      - 'functions/shared/cacheConfig.ts'
      - 'scripts/cf-validate.sh'
      - 'scripts/validate_edge_cache.sh'
      - 'docs/runbooks/cloudflare-cache-validation.md'
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare/**'
      - 'functions/src/feed/**'
      - 'functions/tests/feed/**'
      - 'functions/shared/cacheConfig.ts'
      - 'scripts/cf-validate.sh'
      - 'scripts/validate_edge_cache.sh'
      - 'docs/runbooks/cloudflare-cache-validation.md'
  workflow_dispatch:
    inputs:
      staging_domain:
        description: 'Optional edge host override for manual runs'
        required: false
  workflow_run:
    workflows:
      - "Deploy Feed Cache Worker"
      - "deploy-asora-function-dev"
    types: [completed]
    branches: [main]

env:
  DEFAULT_EDGE_DOMAIN: dev.asora.co.za
  TEST_ENDPOINT: '/api/feed/discover'

jobs:
  worker-unit-tests:
    if: ${{ github.event_name != 'workflow_run' }}
    name: Worker Cache Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Run Worker unit tests
        run: |
          cd functions
          npm test -- --runTestsByPath tests/feed/cloudflare.worker-cache.test.ts
        env:
          NODE_ENV: test

  live-cache-validation:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Validate Edge Cache Behavior
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for deployment to settle
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 30

      - name: Resolve validation domain
        env:
          REQUESTED_DOMAIN: ${{ github.event.inputs.staging_domain }}
        run: |
          set -euo pipefail

          DOMAIN="${REQUESTED_DOMAIN:-${DEFAULT_EDGE_DOMAIN}}"
          if ! getent ahosts "${DOMAIN}" >/dev/null 2>&1; then
            echo "❌ Cache validation domain '${DOMAIN}' does not resolve."
            echo "Pass a valid workflow_dispatch input or restore the canonical edge host."
            exit 1
          fi

          echo "CACHE_VALIDATION_DOMAIN=${DOMAIN}" >> "$GITHUB_ENV"
          echo "Using cache validation host: ${DOMAIN}"

      - name: Validate discover cache behavior
        run: |
          set -euo pipefail
          DOMAIN="${CACHE_VALIDATION_DOMAIN}" PATH_FEED="${TEST_ENDPOINT}" bash ./scripts/validate_edge_cache.sh

      - name: Test News Path Bypass
        run: |
          set -euo pipefail

          echo "🧪 Testing news path bypass..."

          NEWS_RESPONSE=$(curl -sS -D - -o /dev/null "https://${CACHE_VALIDATION_DOMAIN}/api/feed/news?limit=20" || { echo "❌ News request failed"; exit 1; })
          NEWS_STATUS=$(echo "$NEWS_RESPONSE" | grep -i 'CF-Cache-Status' | cut -d: -f2 | tr -d ' \r\n' || echo "UNKNOWN")
          NEWS_CACHE_CONTROL=$(echo "$NEWS_RESPONSE" | grep -i 'Cache-Control' | cut -d: -f2- | tr -d '\r\n' || echo "UNKNOWN")

          echo "📊 News path results:"
          echo "  /api/feed/news CF-Cache-Status: ${NEWS_STATUS}"
          echo "  /api/feed/news Cache-Control: ${NEWS_CACHE_CONTROL}"
          echo ""

          if [[ "${NEWS_CACHE_CONTROL}" != *"no-store"* ]] || [[ "${NEWS_CACHE_CONTROL}" != *"private"* ]]; then
            echo "❌ FAIL: News feed should not be cached, got: ${NEWS_CACHE_CONTROL}"
            exit 1
          fi

          if [[ "${NEWS_STATUS}" == "HIT" ]]; then
            echo "❌ FAIL: News feed should not return CF-Cache-Status: HIT, got: ${NEWS_STATUS}"
            exit 1
          fi

          echo "✅ News path bypass test PASSED"
