---
name: Mobile Security Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  id-token: write

jobs:
  verify-secrets:
    name: Verify Required Variables
    runs-on: ubuntu-latest
    steps:
      - name: Ensure required variables
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          for k in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            v="${!k:-}"
            [ -n "$v" ] || { echo "Missing variable: $k"; exit 1; }
          done

  check-pins-and-integrity:
    # Only run on push to main/release branches - skip for pull_request events
    # because Azure federated identity doesn't have pull_request subject claim
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) }}
    runs-on: ubuntu-latest
    needs: verify-secrets
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4.1.7

      - name: Install jq, zip, unzip
        run: sudo apt-get update && sudo apt-get install -y jq zip unzip

      - name: Isolate AZ cache
        shell: bash
        run: |
          set -euo pipefail
          DIR="$RUNNER_TEMP/azcfg-${GITHUB_RUN_ID}"
          mkdir -p "$DIR"
          echo "AZURE_CONFIG_DIR=$DIR" >> "$GITHUB_ENV"
      - name: Verify OIDC token env
        run: |
          set -euo pipefail
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || { echo "::error::ACTIONS_ID_TOKEN_REQUEST_URL missing"; exit 1; }

      - name: Fail if legacy Azure secrets are present
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          [ -z "${AZURE_CREDENTIALS:-}" ] || { echo "ERROR: legacy secret AZURE_CREDENTIALS present"; exit 1; }
          [ -z "${ARM_CLIENT_SECRET:-}" ] || { echo "ERROR: legacy secret ARM_CLIENT_SECRET present"; exit 1; }

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set Azure subscription context
        run: |
          set -euo pipefail
          az cloud set -n AzureCloud
          az account set --subscription "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          az account show -o table

      - name: Resolve function host
        env:
          SUBS: ${{ env.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          SUBS="${SUBS:?}"
          RG="asora-psql-flex"
          APP="asora-function-dev"
          az account set --subscription "$SUBS"
          echo "Try ARM first (more reliable across plan types)"
          APP_JSON=$(az rest --method get --url "https://management.azure.com/subscriptions/${SUBS}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}?api-version=2022-03-01")
          HOST=$(jq -r '.properties.defaultHostName // empty' <<<"$APP_JSON")
          if [ -z "$HOST" ]; then
            echo "::error::defaultHostName not returned"; exit 1
          fi
          echo "Detected function host: $HOST"
          echo "FUNCTION_BASE_URL=https://${HOST}" >> "$GITHUB_ENV"
          echo "BASE_URL=https://${HOST}" >> "$GITHUB_ENV"


      - name: Check for SPKI pin placeholders in entire codebase
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning entire codebase for SPKI pin placeholders..."

          # Search for actual placeholder values in pin lists, excluding validation code
          # Look for placeholder patterns that appear as actual pin values (not in validation)
          placeholder_matches="$(find . -name "*.dart" -type f -exec grep -Hn "sha256/.*REPLACE_WITH_SPKI\|sha256/.*YOUR_SPKI_PIN\|sha256/.*TODO\|sha256/.*FIXME" {} \; 2>/dev/null || true)"

          if [ -n "$placeholder_matches" ]; then
            echo "::error::Found SPKI pin placeholders in pin values:"
            printf '%s\n' "$placeholder_matches"
            echo ""
            echo "All SPKI pin placeholders must be replaced with real pins before merging."
            echo "Update the authoritative pins in lib/core/security/cert_pinning.dart."
            exit 1
          else
            echo "✓ No SPKI pin placeholders found in pin values."
            echo "Reference pins live in lib/core/security/cert_pinning.dart."
          fi

      - name: Check staging/prod SPKI pin lifecycle state
        shell: bash
        run: |
          set -euo pipefail
          ENV_FILE="lib/core/config/environment_config.dart"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::$ENV_FILE not found"
            exit 1
          fi

          get_state() {
            local block_start="$1"
            local block_end="$2"
            awk "/^const ${block_start}/,/^const ${block_end}/" "$ENV_FILE" \
              | sed -n 's/.*lifecycleState: PinLifecycleState\.\([a-z]*\).*/\1/p' \
              | head -n 1
          }

          # Check for empty spkiPinsBase64 arrays inside the staging/prod security const blocks
          # and only fail if a live lifecycle state is marked empty.
          staging_state="$(get_state '_stagingMobileSecurity' '_stagingConfig')"
          prod_state="$(get_state '_prodMobileSecurity' '_prodConfig')"
          staging_state="${staging_state:-live}"
          prod_state="${prod_state:-live}"

          staging_empty=false
          prod_empty=false

          # Extract staging block and check for empty array
          if awk '/^const _stagingMobileSecurity/,/^const _stagingConfig/' "$ENV_FILE" \
              | grep -Eq 'spkiPinsBase64:[[:space:]]*\['; then
            if awk '/^const _stagingMobileSecurity/,/^const _stagingConfig/' "$ENV_FILE" \
                | grep -Eq 'spkiPinsBase64:[[:space:]]*\[[[:space:]]*\]'; then
              staging_empty=true
            fi
          fi

          # Extract prod block and check for empty array
          if awk '/^const _prodMobileSecurity/,/^const _prodConfig/' "$ENV_FILE" \
              | grep -Eq 'spkiPinsBase64:[[:space:]]*\['; then
            if awk '/^const _prodMobileSecurity/,/^const _prodConfig/' "$ENV_FILE" \
                | grep -Eq 'spkiPinsBase64:[[:space:]]*\[[[:space:]]*\]'; then
              prod_empty=true
            fi
          fi

          failed=false
          if [ "$staging_state" = "live" ] && [ "$staging_empty" = "true" ]; then
            echo "::error::LAUNCH BLOCKER: staging pins are marked live but spkiPinsBase64 is empty in $ENV_FILE."
            echo "  Staging API host: asora-function-staging.northeurope-01.azurewebsites.net"
            echo "  TLS pinning is currently FAIL-OPEN for staging (all connections pass unchecked)."
            echo ""
            echo "  To fix, extract and populate the staging SPKI pin:"
            echo "    ./scripts/extract-spki-pins.sh asora-function-staging.northeurope-01.azurewebsites.net"
            echo "  Then add the output to _stagingMobileSecurity.tlsPins.spkiPinsBase64 in $ENV_FILE."
            echo "  See docs/runbooks/tls-pinning-rotation.md for the full procedure."
            failed=true
          fi

          if [ "$prod_state" = "live" ] && [ "$prod_empty" = "true" ]; then
            echo "::error::LAUNCH BLOCKER: production pins are marked live but spkiPinsBase64 is empty in $ENV_FILE."
            echo "  Production API host: asora-function-prod.northeurope-01.azurewebsites.net"
            echo "  TLS pinning is currently FAIL-OPEN for production (all connections pass unchecked)."
            echo ""
            echo "  To fix, extract and populate the production SPKI pins (include a backup):"
            echo "    ./scripts/extract-spki-pins.sh asora-function-prod.northeurope-01.azurewebsites.net"
            echo "    CERT_INDEX=1 ./scripts/extract-spki-pins.sh asora-function-prod.northeurope-01.azurewebsites.net"
            echo "  Then add both outputs to _prodMobileSecurity.tlsPins.spkiPinsBase64 in $ENV_FILE."
            echo "  See docs/runbooks/tls-pinning-rotation.md for the full procedure."
            failed=true
          fi

          if [ "$failed" = "true" ]; then
            echo ""
            echo "  NOTE: These environments may not be provisioned yet. If the Azure Function Apps"
            echo "  (asora-function-staging, asora-function-prod) are not deployed, pin extraction"
            echo "  will fail gracefully. Once deployed, re-run pin extraction and update the config."
            exit 1
          fi

          if [ "$staging_state" = "planned" ] && [ "$staging_empty" = "true" ]; then
            echo "ℹ staging pins are planned; empty spkiPinsBase64 is intentional until the host is provisioned."
          fi

          if [ "$prod_state" = "planned" ] && [ "$prod_empty" = "true" ]; then
            echo "ℹ production pins are planned; empty spkiPinsBase64 is intentional until the host is provisioned."
          fi

          echo "✓ Staging and production SPKI lifecycle states are explicit."

      - name: Verify live certificate pins
        env:
          EXTRA_PIN_HOSTS: asora-function-dev-c3fyhqcfctdddfa2.northeurope-01.azurewebsites.net,asora-function-staging.northeurope-01.azurewebsites.net,asora-function-prod.northeurope-01.azurewebsites.net
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_pins.py
          cat mobile-pin-report.json

      - name: Upload pin verification report
        uses: actions/upload-artifact@v4.4.0
        with:
          name: mobile-pin-report
          path: mobile-pin-report.json
          if-no-files-found: error

      - name: Check for security placeholders
        shell: bash
        run: |
          set -euo pipefail
          security_matches="$(find . -name "*.dart" -type f -exec grep -Hn "TODO.*[Ss]ecurity\|FIXME.*[Ss]ecurity\|PLACEHOLDER.*[Ss]ecurity" {} \; 2>/dev/null || true)"
          if [ -n "$security_matches" ]; then
            echo "::warning::Found security-related placeholders that may need attention:"
            printf '%s\n' "$security_matches"
          else
            echo "✓ No security TODO/FIXME placeholders detected."
          fi

      - name: Dart format check (optional)
        shell: bash
        run: |
          # Check if Flutter/Dart is available, skip if not
          if command -v dart &> /dev/null; then
            echo "Running Dart format check..."
            dart format --set-exit-if-changed . || echo "::warning::Code formatting issues found. Run 'dart format .' to fix."
          else
            echo "Dart not available, skipping format check."
          fi

      - name: Dart analyze (optional)
        shell: bash
        run: |
          # Check if Flutter/Dart is available, skip if not
          if command -v dart &> /dev/null; then
            echo "Running Dart analyzer..."
            dart analyze . || echo "::warning::Dart analyzer found issues. Review and fix before merging."
          else
            echo "Dart not available, skipping analysis."
          fi
