---
name: Android Release Build (Obfuscated)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks
      KEY_PROPERTIES_PATH: android/key.properties
    steps:
      - uses: actions/checkout@v4.1.7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
      - name: Flutter pub get
        run: flutter pub get

      - name: Install Android native SDK components
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$SDK_ROOT/cmdline-tools/bin/sdkmanager"
          fi
          if [ ! -x "$SDKMANAGER" ]; then
            echo "sdkmanager not found under $SDK_ROOT"
            exit 1
          fi

          # `yes` can end with SIGPIPE when sdkmanager closes stdin early.
          # Ignore preflight license exit and fail only if package install fails.
          set +o pipefail
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          yes | "$SDKMANAGER" "cmake;3.22.1" "ndk;28.2.13676358"
          INSTALL_EXIT=$?
          set -o pipefail
          if [ "$INSTALL_EXIT" -ne 0 ]; then
            echo "sdkmanager package install failed with exit code $INSTALL_EXIT"
            exit "$INSTALL_EXIT"
          fi

      # --- Firebase config (gitignored) ---
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "Missing required secret: GOOGLE_SERVICES_JSON"; exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          test -s android/app/google-services.json || { echo "Decoded google-services.json is empty"; exit 1; }

      # --- Android release signing ---
      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          SECRETS_URL="https://github.com/${{ github.repository }}/settings/secrets/actions"
          FAILED=0

          check_secret() {
            local key="$1"
            local hint="$2"
            if [[ -z "${!key:-}" ]]; then
              echo "::error title=Missing secret — ${key}::${hint}"
              echo "  ✗ ${key} is not set" >&2
              echo "    → ${hint}" >&2
              FAILED=$(( FAILED + 1 ))
            fi
          }

          check_secret "ANDROID_KEYSTORE_BASE64" \
            "Generate a JKS upload keystore and base64-encode it, then add it at ${SECRETS_URL}.
            Generation commands (run once, back up the .jks file offline):
              keytool -genkey -v -keystore upload-keystore.jks -storetype JKS -keyalg RSA -keysize 2048 -validity 10000 -alias upload
              base64 -w0 upload-keystore.jks    # Linux
              base64 -i  upload-keystore.jks    # macOS
            See: docs/runbooks/store-submission-evidence.md §3.1"

          check_secret "ANDROID_KEY_ALIAS" \
            "Alias used in 'keytool -genkey -alias <VALUE>' (e.g. 'upload'). Add at: ${SECRETS_URL}"

          check_secret "ANDROID_KEYSTORE_PASSWORD" \
            "Store password chosen during keytool -genkey. Add at: ${SECRETS_URL}"

          check_secret "ANDROID_KEY_PASSWORD" \
            "Key password (can be the same as the store password). Add at: ${SECRETS_URL}"

          if [[ "$FAILED" -gt 0 ]]; then
            echo "$FAILED Android signing secret(s) missing — cannot proceed with release build." >&2
            exit 1
          fi

      - name: Materialize Android signing files
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          if [[ ! -s "$KEYSTORE_PATH" ]]; then
            echo "::error title=Invalid keystore::Decoded ANDROID_KEYSTORE_BASE64 is empty. Re-encode the keystore: base64 -w0 upload-keystore.jks (Linux) or base64 -i upload-keystore.jks (macOS). Update the secret at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          cat > "$KEY_PROPERTIES_PATH" <<EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF
          chmod 600 "$KEY_PROPERTIES_PATH"

          if ! keytool -list \
              -keystore "$KEYSTORE_PATH" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error title=Keystore validation failed::keytool -list rejected the keystore. Verify ANDROID_KEY_ALIAS ('${ANDROID_KEY_ALIAS}') and ANDROID_KEYSTORE_PASSWORD match the keystore. Debug locally: keytool -list -keystore upload-keystore.jks -storepass \$ANDROID_KEYSTORE_PASSWORD -alias \$ANDROID_KEY_ALIAS"
            exit 1
          fi

      - name: Build Android AAB (obfuscated)
        run: |
          set -euo pipefail
          TS="$(date +%Y%m%d%H%M%S)"
          flutter build appbundle --release --obfuscate --split-debug-info="build/symbols/android/${TS}"
          test -s build/app/outputs/bundle/release/app-release.aab

      - name: Clean signing material
        if: always()
        run: |
          set -euo pipefail
          rm -f "$KEYSTORE_PATH" "$KEY_PROPERTIES_PATH" android/app/google-services.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.4.0
        with:
          name: android-release
          path: |
            build/app/outputs/bundle/release/*.aab
            build/symbols/android/**
