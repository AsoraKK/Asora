name: Reviewed Infrastructure Change

on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Explicit infrastructure operation'
        required: true
        default: 'terraform_plan_apply'
        type: choice
        options:
          - terraform_plan_apply
          - acs_email_domain_verification
      apply:
        description: 'Apply the reviewed Terraform plan'
        required: true
        default: false
        type: boolean
      change_ticket:
        description: 'Approved infrastructure change identifier'
        required: true
        type: string
  workflow_call:
    inputs:
      operation:
        required: false
        default: 'terraform_plan_apply'
        type: string
      apply:
        required: false
        default: false
        type: boolean
      change_ticket:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: shared-mvp-infrastructure-change
  cancel-in-progress: false

env:
  TF_WORKING_DIR: infra

jobs:
  validate-approval:
    name: Validate reviewed infrastructure change
    runs-on: ubuntu-latest
    environment: infrastructure-change
    steps:
      - name: Validate approval metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ inputs.change_ticket }}" =~ ^[A-Za-z0-9._/-]{3,80}$ ]]; then
            echo '::error::A valid approved infrastructure change identifier is required.'
            exit 1
          fi

  terraform:
    needs: validate-approval
    if: ${{ inputs.operation == 'terraform_plan_apply' }}
    name: Plan reviewed shared-MVP infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure-change
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_environment: development
      INFRASTRUCTURE_CHANGE_PATH: ${{ inputs.apply && 'approved' || 'plan-only' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform init and validate
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="$TF_WORKING_DIR" init -input=false
          terraform -chdir="$TF_WORKING_DIR" validate

      - name: Terraform plan
        run: terraform -chdir="$TF_WORKING_DIR" plan -input=false -out=tfplan

      - name: Enforce protected-resource safety
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir="$TF_WORKING_DIR" show -json tfplan > "$RUNNER_TEMP/tfplan.json"
          if [[ "${{ inputs.apply }}" == 'true' ]]; then
            node scripts/validate-terraform-plan-safety.mjs "$RUNNER_TEMP/tfplan.json" --allow-protected-changes
          else
            node scripts/validate-terraform-plan-safety.mjs "$RUNNER_TEMP/tfplan.json"
          fi

      - name: Terraform apply reviewed plan
        if: ${{ inputs.apply }}
        run: terraform -chdir="$TF_WORKING_DIR" apply -input=false tfplan

  configure-acs-email-domain:
    needs: validate-approval
    if: ${{ inputs.operation == 'acs_email_domain_verification' && inputs.apply }}
    name: Configure ACS email domain verification
    uses: ./.github/workflows/configure-acs-email-domain.yml
    with:
      change_ticket: ${{ inputs.change_ticket }}
    secrets: inherit
