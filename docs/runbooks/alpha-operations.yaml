schemaVersion: 1
owner: Kyle
agentPolicy: docs/policy/operational-agent-alpha.md
runbooks:
  - id: authentication_outage
    severity: P0
    triggers: [auth_success_rate_below_95_percent, refresh_failures_spike]
    automatedEvidence: [health_response, auth_request_metrics, sanitized_error_codes, deployment_sha]
    safeDiagnostics: [probe_health, probe_userinfo_without_token, inspect_key_vault_reference_status]
    recommendedActions: [enable_read_only_mode_if_writes_are_unsafe, prepare_identity_provider_status_summary]
    approvalRequired: [disable_authentication, rotate_jwt_secret, change_access_policy, deploy, rollback]
    rollbackCriteria: [regression_started_after_current_release]
    verification: [new_login_succeeds, refresh_rotation_succeeds, revoked_session_fails]
    escalation: Kyle
    retain: [timeline, metrics, release_manifest, sanitized_logs]
  - id: feed_degradation
    severity: P1
    triggers: [warm_p95_at_or_above_200_ms, error_rate_at_or_above_1_percent]
    automatedEvidence: [feed_matrix, app_insights_percentiles, cosmos_ru, cache_hit_ratio, cold_start_count]
    safeDiagnostics: [run_read_only_feed_matrix, inspect_query_timings, inspect_cache_headers]
    recommendedActions: [disable_reputation_ranking, reduce_nonessential_enrichment, prepare_rollback]
    approvalRequired: [deploy, rollback, change_cohort_stage]
    rollbackCriteria: [privacy_regression, error_rate_increase, p95_regression]
    verification: [p95_below_200_ms, p99_below_400_ms, errors_below_1_percent]
    escalation: Kyle
    retain: [k6_json, query_metrics, artifact_digest]
  - id: cosmos_failure
    severity: P0
    triggers: [cosmos_unavailable, sustained_429s, health_cosmos_degraded]
    automatedEvidence: [health_response, dependency_metrics, request_units, throttles]
    safeDiagnostics: [read_account_status, inspect_private_endpoint, inspect_index_policy]
    recommendedActions: [enable_read_only_mode, pause_registration_and_writes]
    approvalRequired: [rotate_cosmos_key, change_firewall, failover_region, deploy]
    rollbackCriteria: [failure_started_after_schema_or_index_change]
    verification: [health_healthy, feed_read, invite_lookup, dsr_container_access]
    escalation: Kyle
    retain: [azure_activity_ids, metrics, configuration_versions]
  - id: postgresql_failure
    severity: P0
    triggers: [postgres_dependency_failures, cohort_reservation_failure, auth_refresh_failure]
    automatedEvidence: [dependency_metrics, sanitized_sql_error_codes, connection_pool_metrics]
    safeDiagnostics: [read_server_status, inspect_pool_saturation, bounded_select_one]
    recommendedActions: [pause_registration, enable_read_only_mode]
    approvalRequired: [rotate_database_credential, failover, schema_change, firewall_change]
    rollbackCriteria: [migration_or_release_caused_failure]
    verification: [auth_refresh, follows_read, cohort_transaction, admin_config_read]
    escalation: Kyle
    retain: [server_events, migration_version, release_manifest]
  - id: redis_cache_failure
    severity: P1
    triggers: [cache_dependency_failures, cache_error_rate_spike]
    automatedEvidence: [cache_metrics, hit_ratio, origin_latency, privacy_headers]
    safeDiagnostics: [read_cache_health, verify_bypass_behavior, inspect_cache_keys_without_values]
    recommendedActions: [bypass_cache_with_private_no_store, prepare_cache_worker_disable]
    approvalRequired: [disable_worker, change_cache_policy, purge_all_cache]
    rollbackCriteria: [cache_change_caused_privacy_or_latency_regression]
    verification: [authenticated_responses_no_store, anonymous_cache_safe, origin_healthy]
    escalation: Kyle
    retain: [headers, worker_version, cache_metrics]
  - id: dsr_queue_failure
    severity: P0
    triggers: [oldest_queue_age_above_15_minutes, poison_message, attempt_zero_stall]
    automatedEvidence: [queue_depth, poison_depth, request_state, attempt_count, function_logs]
    safeDiagnostics: [inspect_queue_metadata, inspect_trigger_registration, run_safe_test_identity_export]
    recommendedActions: [pause_new_delete_finalization, prepare_worker_restart]
    approvalRequired: [restart_service, deploy, delete_queue_message, change_retention]
    rollbackCriteria: [release_regressed_queue_consumption]
    verification: [queued_to_review_transition, attempt_increment, poison_alert, export_expiry]
    escalation: Kyle
    retain: [dsr_evidence_json, correlation_ids, queue_metrics]
  - id: hive_outage
    severity: P1
    triggers: [classifier_unavailable_rate_spike, hive_latency_timeout]
    automatedEvidence: [provider_status, classifier_error_rate, under_review_rate, config_failure_mode]
    safeDiagnostics: [safe_hive_health_request, inspect_key_vault_reference_status]
    recommendedActions: [apply_configured_under_review_or_fail_closed_behavior, pause_posting_if_backlog_unsafe]
    approvalRequired: [rotate_hive_key, change_threshold, change_failure_mode]
    rollbackCriteria: [new_classifier_release_or_config_caused_outage]
    verification: [classification_success, no_public_scores, backlog_age_normal]
    escalation: Kyle
    retain: [provider_request_ids, categorical_counts, config_version]
  - id: moderation_backlog
    severity: P1
    triggers: [oldest_case_above_24_hours, queue_growth_three_intervals]
    automatedEvidence: [open_flags, pending_appeals, oldest_age, label_distribution]
    safeDiagnostics: [read_queue_summary, categorize_reasons, draft_prioritized_worklist]
    recommendedActions: [pause_community_voting, reduce_cohort_intake]
    approvalRequired: [bulk_moderation, change_threshold, expand_staff_access]
    rollbackCriteria: [policy_or_release_created_false_positive_spike]
    verification: [queue_age_recovered, sampled_decisions_audited]
    escalation: Kyle
    retain: [aggregate_summary, decision_versions, audit_ids]
  - id: invitation_abuse
    severity: P1
    triggers: [redemption_rate_spike, repeated_invalid_codes, active_invite_cap_reached]
    automatedEvidence: [aggregate_attempts, rate_limit_events, invite_status_counts, cohort_capacity]
    safeDiagnostics: [inspect_hashed_invite_records, inspect_rate_limit_metrics]
    recommendedActions: [disable_invite_redemption, revoke_individual_invites]
    approvalRequired: [revoke_large_group, change_cohort_cap, change_access_policy]
    rollbackCriteria: [invite_change_blocks_valid_cohort]
    verification: [revoked_invite_fails, valid_invite_single_use, cap_enforced]
    escalation: Kyle
    retain: [invite_ids_not_codes, rate_metrics, audit_ids]
  - id: credential_exposure
    severity: P0
    triggers: [secret_scan_finding, provider_alert, credential_in_log_or_artifact]
    automatedEvidence: [sanitized_finding_path, commit_sha, provider_identifier, artifact_digest]
    safeDiagnostics: [stop_artifact_promotion, search_history_without_printing_value, identify_consumers]
    recommendedActions: [block_alpha, prepare_provider_rotation_plan]
    approvalRequired: [rotate_or_revoke_credential, purge_history, deploy]
    rollbackCriteria: [replacement_breaks_service]
    verification: [old_credential_rejected, new_reference_works, full_scan_clean]
    escalation: Kyle
    retain: [sanitized_register, scan_report, rotation_metadata]
  - id: cloudflare_outage
    severity: P0
    triggers: [pages_unreachable, access_redirect_loop, worker_5xx_spike]
    automatedEvidence: [dns_tls_probe, cloudflare_status, origin_health, worker_version]
    safeDiagnostics: [probe_origin, inspect_dns_and_tls, inspect_access_policy_read_only]
    recommendedActions: [prepare_origin_bypass_recommendation, pause_web_promotion]
    approvalRequired: [change_dns, change_access_policy, disable_worker]
    rollbackCriteria: [new_pages_or_worker_deployment_caused_failure]
    verification: [web_200, access_enforced, cache_privacy_pass]
    escalation: Kyle
    retain: [ray_ids, dns_answers, deployment_digest]
  - id: deployment_failure
    severity: P0
    triggers: [artifact_deploy_failed, health_failed, live_contract_failed]
    automatedEvidence: [ci_run_id, release_sha, artifact_hash, deployment_logs]
    safeDiagnostics: [verify_artifact_digest, inspect_function_registration, probe_health]
    recommendedActions: [prepare_rollback_to_last_verified_artifact]
    approvalRequired: [retry_deploy, rollback, change_environment]
    rollbackCriteria: [post_deploy_gate_failure]
    verification: [exact_sha, health, contracts, browser_smoke, dsr]
    escalation: Kyle
    retain: [release_manifest, workflow_logs, rollback_result]
  - id: rollback
    severity: P0
    triggers: [approved_rollback_decision]
    automatedEvidence: [current_and_target_hashes, incident_summary, backup_status]
    safeDiagnostics: [verify_target_artifact, prepare_commands, compare_schema_compatibility]
    recommendedActions: [execute_only_after_kyle_approval]
    approvalRequired: [rollback]
    rollbackCriteria: [target_artifact_fails_validation]
    verification: [health, contracts, browser_smoke, dsr, cache_headers]
    escalation: Kyle
    retain: [approval, hashes, timestamps, verification]
  - id: read_only_mode
    severity: P1
    triggers: [write_safety_uncertain, dependency_degraded]
    automatedEvidence: [current_flags, reason, stage, incident_id]
    safeDiagnostics: [read_current_config, enumerate_write_endpoints]
    recommendedActions: [prepare_audited_read_only_config_change]
    approvalRequired: [enable_or_disable_read_only_mode]
    rollbackCriteria: [dependency_recovered_and_write_verification_passed]
    verification: [reads_work, writes_return_503, auth_and_dsr_status_visible]
    escalation: Kyle
    retain: [config_versions, approval, route_probe_results]
  - id: user_data_incident
    severity: P0
    triggers: [cross_user_data, export_scope_error, unauthorized_access]
    automatedEvidence: [correlation_ids, affected_resource_types, access_logs_sanitized]
    safeDiagnostics: [preserve_evidence, stop_affected_path, determine_scope_without_exporting_data]
    recommendedActions: [enable_read_only_mode, begin_privacy_incident_process]
    approvalRequired: [delete_data, notify_users, change_access_policy, deploy]
    rollbackCriteria: [release_or_config_introduced_boundary_failure]
    verification: [authorization_tests, export_isolation, audit_integrity]
    escalation: Kyle_and_legal
    retain: [incident_record, audit_ids, legal_decisions]
  - id: ai_false_positive_spike
    severity: P1
    triggers: [conflict_rate_above_review_threshold, appeal_overturn_spike]
    automatedEvidence: [categorical_distribution, conflict_rate, appeal_rate, threshold_version]
    safeDiagnostics: [sample_sanitized_decisions, compare_provider_status, inspect_version_change]
    recommendedActions: [route_conflicts_under_review, pause_reputation_awards_for_affected_items]
    approvalRequired: [change_ai_threshold, change_moderation_threshold, bulk_relabel]
    rollbackCriteria: [threshold_or_model_version_caused_spike]
    verification: [conflict_rate_normal, human_sample_review, no_public_scores]
    escalation: Kyle
    retain: [aggregate_metrics, decision_versions, appeal_outcomes]
