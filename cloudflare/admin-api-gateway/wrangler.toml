name = "lythaus-admin-api-gateway"
main = "worker.ts"
compatibility_date = "2026-07-01"

# Bind only after the dedicated Access application is verified. ORIGIN_AUTH_TOKEN
# is a Worker secret; this configuration intentionally declares no route.

[vars]
ENVIRONMENT = "mvp"
EXPECTED_HOSTNAMES = "admin-api.lythaus.co,admin-api.asora.co.za,control.asora.co.za"
ORIGIN_BASE = "https://asora-function-dev.azurewebsites.net"
CORS_ALLOWED_ORIGINS = "https://admin.lythaus.co"
RATE_LIMIT_REQUIRED = "true"
GATEWAY_CLASS = "admin_gateway"
GATEWAY_POLICY = "admin"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5dfa59d0d2684a9d8637b66e03d4de24"
