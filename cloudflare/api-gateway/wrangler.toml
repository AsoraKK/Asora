name = "lythaus-api-gateway"
main = "worker.ts"
compatibility_date = "2026-07-01"

# ORIGIN_BASE must be set as an environment variable after the Azure origin is
# positively identified. ORIGIN_AUTH_TOKEN must be stored with `wrangler secret`.
# RATE_LIMIT_KV bindings and custom domains are intentionally omitted until the
# provider audit and staging gate pass.

[env.staging.vars]
ENVIRONMENT = "staging"
EXPECTED_HOSTNAMES = "api.staging.lythaus.co"
CORS_ALLOWED_ORIGINS = "https://app.staging.lythaus.co"
RATE_LIMIT_REQUIRED = "true"

[env.production.vars]
ENVIRONMENT = "production"
EXPECTED_HOSTNAMES = "api.lythaus.co"
CORS_ALLOWED_ORIGINS = "https://app.lythaus.co"
RATE_LIMIT_REQUIRED = "true"
