name = "lythaus-api-gateway"
main = "worker.ts"
compatibility_date = "2026-07-01"

# The single authorised Azure MVP origin is shared by preview and live edge
# deployments. ORIGIN_AUTH_TOKEN must be stored with `wrangler secret`.
# Preview hostnames/origins, RATE_LIMIT_KV bindings, and custom domains are
# intentionally supplied at deploy time after the Cloudflare audit passes.

[env.preview.vars]
ENVIRONMENT = "preview"
EXPECTED_HOSTNAMES = "lythaus-api-gateway-preview.asora.workers.dev"
ORIGIN_BASE = "https://asora-function-dev.azurewebsites.net"
CORS_ALLOWED_ORIGINS = "https://a606f6f7.lythaus-web.pages.dev"
RATE_LIMIT_REQUIRED = "true"

[[env.preview.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5dfa59d0d2684a9d8637b66e03d4de24"

[env.mvp.vars]
ENVIRONMENT = "mvp"
EXPECTED_HOSTNAMES = "api.lythaus.co"
ORIGIN_BASE = "https://asora-function-dev.azurewebsites.net"
CORS_ALLOWED_ORIGINS = "https://app.lythaus.co"
RATE_LIMIT_REQUIRED = "true"
