name = "asora-api-compatibility-gateway"
main = "worker.ts"
compatibility_date = "2026-07-01"

# Deployment must use ORIGIN_AUTH_TOKEN as a Worker secret. No route is bound
# from this file; preserve the existing legacy routes until a version snapshot,
# Access evidence, and rollback plan are recorded.

[vars]
ENVIRONMENT = "mvp"
EXPECTED_HOSTNAMES = "asora.co.za,www.asora.co.za,dev.asora.co.za"
ORIGIN_BASE = "https://asora-function-dev.azurewebsites.net"
# Legacy API traffic remains method-preserving, but obsolete browser origins
# are unsupported. A temporary immutable preview, if needed, is supplied only
# through the deployment configuration after review.
CORS_ALLOWED_ORIGINS = "https://app.lythaus.co"
RATE_LIMIT_REQUIRED = "true"
GATEWAY_CLASS = "legacy_custom"
GATEWAY_POLICY = "public"
LEGACY_API_SUNSET = "Tue, 15 Sep 2026 00:00:00 GMT"
LEGACY_SUCCESSOR = "https://api.lythaus.co/api"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5dfa59d0d2684a9d8637b66e03d4de24"
