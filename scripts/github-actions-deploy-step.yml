      # Azure Functions v4 Production Deployment
      - name: Package Functions v4
        working-directory: ./functions
        run: |
          echo "📦 Packaging Azure Functions v4 for production..."
          bash ../scripts/package-v4.sh
        
      - name: Deploy to Azure Functions
        working-directory: ./functions
        run: |
          echo "🚀 Deploying to Azure Functions..."
          az functionapp deployment source config-zip \
            -g asora-psql-flex -n asora-function-dev \
            --src dist-v4-final.zip
          
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 45
          
      - name: Verify Deployment
        run: |
          echo "🔍 Verifying function endpoints..."
          az functionapp function list \
            -g asora-psql-flex -n asora-function-dev \
            --query "[].name" --output tsv
          
          echo "🏥 Testing health endpoint..."
          test -n "${MVP_PUBLIC_API_BASE_URL:-}" || { echo "MVP_PUBLIC_API_BASE_URL is required"; exit 1; }
          curl -fsS "${MVP_PUBLIC_API_BASE_URL%/}/health" >/dev/null || exit 1
          
          echo "✅ Deployment verification complete!"
