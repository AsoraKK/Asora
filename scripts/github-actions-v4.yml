# GitHub Actions step for Azure Functions v4 deployment
# Add this to your existing workflow after OIDC login

- name: Package Azure Functions v4
  shell: bash
  run: |
    chmod +x scripts/package-v4.sh
    ./scripts/package-v4.sh

- name: Deploy to Azure Functions
  run: |
    az functionapp deployment source config-zip \
      -g asora-psql-flex \
      -n asora-function-dev \
      --src dist-v4-final.zip \
      --timeout 600

- name: Verify Deployment
  run: |
    # Wait for deployment to stabilize
    sleep 30
    
    # List functions
    az functionapp function list \
      -g asora-psql-flex \
      -n asora-function-dev \
      --query "[].name" \
      --output tsv
    
    # Health check
    test -n "${MVP_PUBLIC_API_BASE_URL:-}" || { echo "MVP_PUBLIC_API_BASE_URL is required"; exit 1; }
    curl -fsS "${MVP_PUBLIC_API_BASE_URL%/}/health" >/dev/null || exit 1

- name: Upload deployment artifact
  if: failure()
  uses: actions/upload-artifact@v4
  with:
    name: deployment-package-v4
    path: dist-v4-final.zip
    retention-days: 7
