name = "feed-cache"
main = "src/index.js"
compatibility_date = "2024-06-01"
routes = [
  { pattern = "dev.asora.co.za/api/feed*", zone_name = "asora.co.za" }
]

[vars]
ORIGIN_BASE = "https://asora-function-dev.azurewebsites.net"
GATEWAY_CLASS = "legacy_custom"

# ORIGIN_AUTH_TOKEN is supplied with `wrangler secret put`; never place it in
# this file or browser-delivered configuration.

